// ============================================================
//  GCal — Google Calendar read layer (single-user, GIS token flow)
//  Reads a CURATED set of calendars, maps events to the app's
//  appointment shape {id, title, start, end, calendarId, owner}.
//  Source calendar (not color) is the authoritative owner signal.
// ============================================================
var GCal = (function () {
  var CLIENT_ID = "420326114521-ov77gi8f8hfgg7knfaa9qv3i1cvobm21.apps.googleusercontent.com";
  var SCOPE = "https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/calendar.readonly";

  // CURATED SET — the only calendars the surface reads. Others in the account are ignored.
  // owner is the yours-vs-hers signal, derived from source-calendar id (structural, not color).
  // (Developer constant, settled by fact. Not a user setting.)
  var CALENDARS = [
    { id: "mweller001@gmail.com", owner: "me"  },
    { id: "aweller001@gmail.com", owner: "her" }
  ];

  var tokenClient = null;
  var accessToken = null;

  // Two-digit local clock time "HH:MM" from an ISO datetime string.
  function hhmm(iso) {
    var d = new Date(iso);
    var h = d.getHours(), m = d.getMinutes();
    return (h < 10 ? "0" + h : "" + h) + ":" + (m < 10 ? "0" + m : "" + m);
  }

  // Bounds for a given local date ("YYYY-MM-DD"), as ISO strings for the API's timeMin/timeMax.
  // Defaults to today when no date is passed, so existing callers are unchanged.
  function dateBounds(dateStr) {
    var d;
    if (dateStr) { var p = dateStr.split("-"); d = new Date(+p[0], (+p[1]) - 1, +p[2]); }
    else { d = new Date(); }
    var start = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 0, 0, 0, 0);
    var end   = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 23, 59, 59, 999);
    return { timeMin: start.toISOString(), timeMax: end.toISOString() };
  }

  // Map one Google event (from a given curated calendar) to the app appt shape.
  // Skips all-day events (no dateTime, only date) — the canvas is a timed surface;
  // all-day handling is a later increment. Returns null to skip.
  // Default prep/travel (minutes) assumed when a Google event carries no explicit values.
  // Google Calendar has no prep/travel fields, so absent = "not specified", NOT "zero" — a
  // zero-buffer render would make the day look falsely empty and defeat accurate day-estimation.
  // These are the app's honest real-world estimate until an event is edited to set actual values.
  // (Developer constants, easily changed. Not a user setting.)
  var DEFAULT_PREP = 15;
  var DEFAULT_TRAVEL = 30;

  function mapEvent(ev, cal) {
    if (!ev.start || !ev.start.dateTime || !ev.end || !ev.end.dateTime) return null; // all-day handled separately
    // prep/travel live in the event's private extendedProperties (proven in the write test).
    // Absent → the app's default estimate (15/30), so the day-estimate stays realistic.
    var xp = (ev.extendedProperties && ev.extendedProperties.private) || {};
    var prep = parseInt(xp.dsPrep, 10); if (isNaN(prep)) prep = DEFAULT_PREP;
    var travel = parseInt(xp.dsTravel, 10); if (isNaN(travel)) travel = DEFAULT_TRAVEL;
    return {
      id: "g:" + cal.id + ":" + ev.id,     // namespaced so it can't collide with Supabase ids
      title: ev.summary || "(busy)",
      start: hhmm(ev.start.dateTime),
      end: hhmm(ev.end.dateTime),
      prep: prep,
      travel: travel,
      calendarId: cal.id,
      owner: cal.owner,
      // carried for the read-only detail popup (next increment); harmless now
      location: ev.location || "",
      description: ev.description || ""
    };
  }

  // Local YYYY-MM-DD for today (for all-day date-range comparison).
  function todayDateStr() {
    var n = new Date();
    var mm = n.getMonth()+1, dd = n.getDate();
    return n.getFullYear() + "-" + (mm<10?"0"+mm:mm) + "-" + (dd<10?"0"+dd:dd);
  }

  // All-day events have start.date (no dateTime). They're day-level FLAGS (e.g. "MOFF"), not
  // timed blocks — rendered as chips in a band above the canvas, not on the timeline.
  // Google's all-day end.date is EXCLUSIVE (the day AFTER the last covered day), so an event
  // that ends ON the 4th has end.date = the 5th. The API query for today therefore returns
  // 4th-ending events whose exclusive end touches today. Belongs-to-today test: start.date <= today
  // AND today < end.date. Without the end check, a 4th-ending event wrongly shows on the 5th.
  function mapAllDay(ev, cal, viewDate) {
    if (!ev.start || ev.start.dateTime || !ev.start.date) return null; // only date-only events
    var day = viewDate || todayDateStr();
    var startD = ev.start.date;                                   // inclusive
    var endD = (ev.end && ev.end.date) ? ev.end.date : startD;    // EXCLUSIVE (day after last covered)
    if (!(startD <= day && day < endD)) return null;              // the day must be within [start, end)
    return {
      id: "gA:" + cal.id + ":" + ev.id,
      title: ev.summary || "(all day)",
      owner: cal.owner,
      calendarId: cal.id,
      description: ev.description || ""
    };
  }

  // Fetch today's events from one calendar → { timed:[...], allDay:[...] }.
  function fetchCalendar(cal, bounds, viewDate) {
    var url = "https://www.googleapis.com/calendar/v3/calendars/"
      + encodeURIComponent(cal.id) + "/events"
      + "?timeMin=" + encodeURIComponent(bounds.timeMin)
      + "&timeMax=" + encodeURIComponent(bounds.timeMax)
      + "&singleEvents=true&orderBy=startTime";
    return fetch(url, { headers: { "Authorization": "Bearer " + accessToken } })
      .then(function (r) {
        if (!r.ok) throw new Error("calendar " + cal.id + " HTTP " + r.status);
        return r.json();
      })
      .then(function (data) {
        var items = data.items || [];
        return {
          timed: items.map(function (ev) { return mapEvent(ev, cal); }).filter(function (x) { return x !== null; }),
          allDay: items.map(function (ev) { return mapAllDay(ev, cal, viewDate); }).filter(function (x) { return x !== null; })
        };
      });
  }

  // Fetch all curated calendars → { timed:[...], allDay:[...] } flattened across calendars.
  // Fetch a given date's events ("YYYY-MM-DD"); defaults to today.
  function fetchEventsForDate(dateStr) {
    if (!accessToken) return Promise.reject(new Error("not connected"));
    var day = dateStr || todayDateStr();
    var bounds = dateBounds(day);
    return Promise.all(CALENDARS.map(function (cal) { return fetchCalendar(cal, bounds, day); }))
      .then(function (results) {
        return {
          timed:  results.reduce(function (acc, r) { return acc.concat(r.timed); }, []),
          allDay: results.reduce(function (acc, r) { return acc.concat(r.allDay); }, [])
        };
      });
  }

  // Init the GIS token client. Resolves when the library is present.
  function init() {
    return new Promise(function (resolve, reject) {
      var tries = 0;
      var iv = setInterval(function () {
        if (window.google && google.accounts && google.accounts.oauth2) {
          clearInterval(iv);
          tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPE,
            callback: function () {} // per-request callback set in connect()
          });
          resolve(true);
        } else if (++tries > 100) { // ~10s
          clearInterval(iv);
          reject(new Error("Google library did not load"));
        }
      }, 100);
    });
  }

  // Trigger the consent popup; resolves with the token on success.
  function connect() {
    return new Promise(function (resolve, reject) {
      if (!tokenClient) { reject(new Error("not initialized")); return; }
      tokenClient.callback = function (resp) {
        if (resp.error) { reject(new Error(resp.error)); return; }
        accessToken = resp.access_token;
        resolve(accessToken);
      };
      tokenClient.requestAccessToken({ prompt: "" }); // "" = silent if already granted, else prompts
    });
  }

  function isConnected() { return !!accessToken; }

  // ---- WRITE OPERATIONS -------------------------------------------------------------------
  // Guardrails: writes ONLY touch the curated calendars (Mark's primary + Anastasia's). The
  // event id used in patches is the RAW Google id (the app's namespaced "g:cal:evId" is split).
  // No delete (deletion stays in Google). No bulk ops — every write is one explicit event.
  var PRIMARY_ID = "mweller001@gmail.com"; // create always targets Mark's calendar
  var curatedIds = CALENDARS.map(function(c){ return c.id; });

  // Split the app's namespaced id "g:<calId>:<eventId>" back into {calId, eventId}.
  function splitId(appId){
    var m = /^g:([^:]+@[^:]+):(.+)$/.exec(appId);
    if(!m) return null;
    return { calId: m[1], eventId: m[2] };
  }
  function guardCal(calId){ return curatedIds.indexOf(calId) !== -1; }

  // PATCH just the app-owned prep/travel metadata on an event (extendedProperties.private).
  // Lowest-risk write: annotates, does not touch the event's calendar data.
  function patchPrepTravel(appId, prep, travel){
    if(!accessToken) return Promise.reject(new Error("not connected"));
    var s = splitId(appId); if(!s) return Promise.reject(new Error("bad event id"));
    if(!guardCal(s.calId)) return Promise.reject(new Error("refusing write outside curated calendars"));
    var url = "https://www.googleapis.com/calendar/v3/calendars/" + encodeURIComponent(s.calId)
      + "/events/" + encodeURIComponent(s.eventId);
    return fetch(url, { method:"PATCH", headers:{ "Authorization":"Bearer "+accessToken, "Content-Type":"application/json" },
      body: JSON.stringify({ extendedProperties:{ private:{ dsPrep:String(prep), dsTravel:String(travel) } } }) })
      .then(function(r){ if(!r.ok) throw new Error("patch prep/travel HTTP "+r.status); return r.json(); });
  }

  // PATCH an event's title and/or times (today's date, local). times are "HH:MM".
  function patchEvent(appId, fields){
    if(!accessToken) return Promise.reject(new Error("not connected"));
    var s = splitId(appId); if(!s) return Promise.reject(new Error("bad event id"));
    if(!guardCal(s.calId)) return Promise.reject(new Error("refusing write outside curated calendars"));
    var body = {};
    if(fields.title!=null) body.summary = fields.title;
    if(fields.start) body.start = { dateTime: dateISO(fields.start, fields.onDate), timeZone: localTZ() };
    if(fields.end)   body.end   = { dateTime: dateISO(fields.end,   fields.onDate), timeZone: localTZ() };
    if(fields.prep!=null || fields.travel!=null){
      body.extendedProperties = { private:{} };
      if(fields.prep!=null)   body.extendedProperties.private.dsPrep = String(fields.prep);
      if(fields.travel!=null) body.extendedProperties.private.dsTravel = String(fields.travel);
    }
    var url = "https://www.googleapis.com/calendar/v3/calendars/" + encodeURIComponent(s.calId)
      + "/events/" + encodeURIComponent(s.eventId);
    return fetch(url, { method:"PATCH", headers:{ "Authorization":"Bearer "+accessToken, "Content-Type":"application/json" },
      body: JSON.stringify(body) })
      .then(function(r){ if(!r.ok) throw new Error("patch event HTTP "+r.status); return r.json(); });
  }

  // CREATE a new timed event TODAY on Mark's primary calendar. times "HH:MM".
  function createEvent(fields){
    if(!accessToken) return Promise.reject(new Error("not connected"));
    var body = {
      summary: fields.title || "(untitled)",
      start: { dateTime: dateISO(fields.start, fields.onDate), timeZone: localTZ() },
      end:   { dateTime: dateISO(fields.end,   fields.onDate), timeZone: localTZ() },
      extendedProperties: { private:{
        dsPrep: String(fields.prep!=null?fields.prep:DEFAULT_PREP),
        dsTravel: String(fields.travel!=null?fields.travel:DEFAULT_TRAVEL)
      } }
    };
    var url = "https://www.googleapis.com/calendar/v3/calendars/" + encodeURIComponent(PRIMARY_ID) + "/events";
    return fetch(url, { method:"POST", headers:{ "Authorization":"Bearer "+accessToken, "Content-Type":"application/json" },
      body: JSON.stringify(body) })
      .then(function(r){ if(!r.ok) throw new Error("create event HTTP "+r.status); return r.json(); });
  }

  // Build an RFC3339 local datetime for TODAY at "HH:MM".
  // Build an RFC3339 local datetime for a given date ("YYYY-MM-DD") at "HH:MM".
  // Defaults to today when no date is given. Parameterized so events created/edited while a
  // FORWARD date is in view land on THAT date, not silently on today.
  function dateISO(hhmmStr, dateStr){
    var p = (hhmmStr||"09:00").split(":");
    var n;
    if (dateStr) { var dp = dateStr.split("-"); n = new Date(+dp[0], (+dp[1])-1, +dp[2]); }
    else { n = new Date(); }
    var d = new Date(n.getFullYear(), n.getMonth(), n.getDate(), parseInt(p[0],10)||0, parseInt(p[1],10)||0, 0);
    // format as local RFC3339 with offset
    function pad(x){ return x<10?"0"+x:""+x; }
    var off = -d.getTimezoneOffset(); var sign = off>=0?"+":"-"; off=Math.abs(off);
    return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())+"T"+pad(d.getHours())+":"+pad(d.getMinutes())+":00"
      + sign + pad(Math.floor(off/60)) + ":" + pad(off%60);
  }
  function localTZ(){ try { return Intl.DateTimeFormat().resolvedOptions().timeZone || "America/New_York"; } catch(e){ return "America/New_York"; } }

  return {
    init: init,
    connect: connect,
    isConnected: isConnected,
    fetchEventsForDate: fetchEventsForDate,
    fetchTodayEvents: fetchEventsForDate,   // alias — existing callers unchanged
    patchPrepTravel: patchPrepTravel,
    patchEvent: patchEvent,
    createEvent: createEvent,
    CALENDARS: CALENDARS
  };
})();

// ============================================================
//  Data layer — schema-light against the `items` table, tolerant reads.
// ============================================================
var Store = {
  loadAll: function () {
    return db.from("items").select("*").then(function (r) {
      if (r.error) throw r.error; return r.data || [];
    });
  },
  add: function (kind, dataObj) {
    return db.from("items").insert([{ kind: kind, data: dataObj }]).select().then(function (r) {
      if (r.error) throw r.error; return r.data[0];
    });
  },
  update: function (id, dataObj) {
    return db.from("items").update({ data: dataObj }).eq("id", id).select().then(function (r) {
      if (r.error) throw r.error; return r.data[0];
    });
  },
  remove: function (id) {
    return db.from("items").delete().eq("id", id).then(function (r) {
      if (r.error) throw r.error; return true;
    });
  }
};
// ---- RECURRENCE: the "recipe". Pure function — turns a recurrence spec + anchor date into a
// finite list of "YYYY-MM-DD" instance dates. Run ONCE at creation; nothing is stored afterward.
// spec = { every:Number, unit:"day"|"week"|"month"|"year", days:[0..6] (weekly only, 0=Sun),
//          endMode:"count"|"date", count:Number, endDate:"YYYY-MM-DD" }
// anchor = "YYYY-MM-DD" (the task's showOn, or today). Returns [] if spec invalid.
function ymd(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function parseYMD(s){ var p=s.split("-"); return new Date(+p[0],(+p[1])-1,+p[2]); }
// Build a date at (year, month, wantedDay) but CLAMP the day to the month's real length, so
// "monthly on the 31st" lands on Feb 28/29, Apr 30, etc., instead of overflowing into next month.
function clampedDate(year, month, wantedDay){
  var lastDay = new Date(year, month+1, 0).getDate();   // day 0 of next month = last day of this
  return new Date(year, month, Math.min(wantedDay, lastDay));
}
var HARD_CAP = 366; // safety ceiling so a bad spec can never runaway-generate

function generateRecurrence(spec, anchor){
  if(!spec || !anchor) return [];
  var every = Math.max(1, parseInt(spec.every,10)||1);
  var unit = spec.unit || "week";
  var start = parseYMD(anchor);
  var out = [];
  var wantCount = spec.endMode==="count" ? Math.max(1, parseInt(spec.count,10)||1) : null;
  var endD = spec.endMode==="date" && spec.endDate ? parseYMD(spec.endDate) : null;
  if(spec.endMode==="date" && !endD) return [];      // date mode needs a date
  if(spec.endMode!=="date" && spec.endMode!=="count") return [];

  function pushIfInRange(d){
    if(endD && d.getTime() > endD.getTime()) return false;
    out.push(ymd(d));
    return true;
  }

  if(unit==="week"){
    // day-of-week selection; interval skips (every N-th week). Anchor's week is week 0.
    // COUNT MODE COUNTS WEEKS (periods), NOT tasks: "6 times, Mon+Wed" = 6 weeks x 2 days = 12 tasks.
    // A week only counts toward the total once it actually emits at least one day (so a partial
    // first week that emits nothing before the anchor doesn't burn an occurrence).
    var days = (spec.days && spec.days.length) ? spec.days.slice().sort(function(a,b){return a-b;}) : [start.getDay()];
    var weekStart = new Date(start); weekStart.setDate(start.getDate() - start.getDay()); // back to Sunday
    var weeksDone = 0, guard=0;
    while(guard++ < HARD_CAP){
      var emittedThisWeek = false;
      for(var i=0;i<days.length;i++){
        var d = new Date(weekStart); d.setDate(weekStart.getDate() + days[i]);
        if(d.getTime() < start.getTime()) continue;         // don't emit before the anchor
        if(!pushIfInRange(d)){ if(endD) return out; }        // date-mode stop
        emittedThisWeek = true;
        if(out.length>=HARD_CAP) return out;
      }
      if(emittedThisWeek){
        weeksDone++;
        if(wantCount!=null && weeksDone>=wantCount) return out;  // counted enough WEEKS
      }
      weekStart.setDate(weekStart.getDate() + 7*every);      // skip (every-1)=interval weeks
    }
    return out;
  }

  // day / month / year: step from the anchor by (every) units each time.
  var d = new Date(start), guard2=0;
  while(guard2++ < HARD_CAP){
    if(wantCount!=null && out.length>=wantCount) return out;
    if(!pushIfInRange(d)){ if(endD) return out; }
    if(wantCount!=null && out.length>=wantCount) return out;
    if(unit==="day")   d = new Date(d.getFullYear(), d.getMonth(), d.getDate()+every);
    else if(unit==="month") d = clampedDate(d.getFullYear(), d.getMonth()+every, start.getDate());
    else if(unit==="year")  d = clampedDate(d.getFullYear()+every, d.getMonth(), start.getDate());
    else return out;
    if(out.length>=HARD_CAP) return out;
  }
  return out;
}

// A seriesId: timestamp + random, unique enough for tagging instances of one series.
function makeSeriesId(){ return "s" + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function readTask(row) {
  var d = row.data || {};
  return {
    id: row.id,
    title: d.title || "(untitled)",
    project: d.project || "—",
    priority: typeof d.priority === "number" ? d.priority : 5,
    effort: clampEffort(typeof d.effort === "number" ? d.effort : 2),
    note: d.note || "",
    done: !!d.done,
    doneAt: d.doneAt || null,            // "YYYY-MM-DD" completion date (null if never/again undone)
    itemKind: d.itemKind || "task",      // "task" | "relax" — relax = a light task, no scheduling
    background: !!d.background,           // legacy; no longer used (background concept removed)
    // prompt fields — all optional; absent = no prompt. showOn gates visibility,
    // fireAt is the Begin moment (a "HH:MM" on the showOn date), warnMin the pre-warning.
    showOn: d.showOn || null,            // "YYYY-MM-DD" or null
    seriesId: d.seriesId || null,        // recurrence tag (null = not part of a series)
    seriesSlot: (typeof d.seriesSlot==="number"?d.seriesSlot:null),
    fireAt: d.fireAt || null,            // "HH:MM" or null (requires showOn)
    warnMin: typeof d.warnMin === "number" ? d.warnMin : 0, // 0 = none
    updated_at: row.updated_at
  };
}
function readAppt(row) {
  var d = row.data || {};
  // prep/travel are the meld's two extra points, in minutes. Optional; absent = 0.
  // (When the Google Calendar layer lands, these come from the event's extendedProperties.)
  return { id: row.id, title: d.title || "(appointment)", start: d.start || "09:00", end: d.end || "10:00",
    prep: typeof d.prep === "number" ? d.prep : 0,
    travel: typeof d.travel === "number" ? d.travel : 0 };
}
// Single source of truth for serializing a task back to its stored data object.
// Every write path uses this so no field (incl. prompt fields) can be dropped.
function taskToData(t){
  return {
    title: t.title, project: t.project, priority: t.priority, effort: clampEffort(t.effort),
    note: t.note, background: t.background, done: t.done, doneAt: t.doneAt || null,
    itemKind: t.itemKind || "task",
    showOn: t.showOn || null, fireAt: t.fireAt || null, warnMin: t.warnMin || 0,
    // preserve recurrence tags through every write, so an edited instance stays part of its series
    seriesId: t.seriesId || null, seriesSlot: (typeof t.seriesSlot==="number"? t.seriesSlot : null)
  };
}

// ============================================================
//  App — plain React (no JSX, no Babel). h = createElement.
// ============================================================
var h = React.createElement;
var useState = React.useState, useMemo = React.useMemo, useCallback = React.useCallback, useEffect = React.useEffect, Fragment = React.Fragment;

var C = {
  ink:"#1c1f26", paper:"#f3f1ec", panel:"#ffffff", panelEdge:"#e2ded4",
  sub:"#6b6f78", faint:"#9b9ea6", rail:"#d8d3c8",
  fixed:"#3a4250", amber:"#c8741a", amberSoft:"#f0e2cf",
  cold:"#5b6f8c", line:"#eae6dd", good:"#5d7052", nowline:"#c8741a"
};
// effort: 1-3 spoons. 3 = "60+" and a stop-and-decompose signal (the old 4/5 top is gone).
var SPOON_MIN = { 1:15, 2:30, 3:60 };
var MAX_SPOON = 3;
function clampEffort(n){ n = (typeof n==="number") ? n : 2; if(n<1) return 1; if(n>MAX_SPOON) return MAX_SPOON; return Math.round(n); }
// priority as color swatches. stored values spaced for forward-compat; highest=red.
// reserved (not yet surfaced): white=0, dark-blue=2, evens 4/6/8.
var PRIORITY = [

  // Forward-only cursor, strict sort order, roll-forward, NO backfill. Gaps are acceptable.
  // A task's shown time is the real slot it landed in — never an invented stamp.
  var schedule = useMemo(function(){

    // s = event start; e = event end; reserveStart = start - travel - prep (the leave/prep edge
    // that tasks must pack against, since prep+travel is spoken-for time before the event).
    var blocks = appts.map(function(a){
        var s = toMin(a.start), e = toMin(a.end);

        // already spent (past), so suppress them — the reserved block collapses to just the
        // live event. reserveStart becomes the event start itself (no pre-buffer). This both
        // fixes the past-clipped-segment layout corruption and yields correct "you're in this
        // until end" behavior; open-time still starts from e (the event end) via the slot math.

    // end among them — you are not free until the last currently-active event ends. Both owners'
    // events count: Anastasia's events are frequently Mark's commitments too (caregiver), so any
    // in-progress event blocks the schedule, not just Mark's. Without this, tasks pack into time
    // you are actually occupied when two events overlap the present moment.
    var inProgNow = blocks.filter(function(b){ return b.inProgress; });
    var freeFrom = packFromMin;

    var slotState = slots.map(function(g){ return { s:g.s, e:g.e, after:g.after, used:0, tasks:[] }; });

      var dur = SPOON_MIN[t.effort] || 30; // effort 3 ("60+") counts as 60 for fit math

    // hatched; tasks are solid, colored by priority swatch. Scale is PX_PER_MIN. ----
    var PX_PER_MIN = 1.6;
    var fitted = schedule.railItems.filter(function(it){ return !it.unfitted && it.endMin > packFromMin; });

    // ONE event is in progress, origin backs up to that event's start so the event you're inside
    // shows in full, with the now-bar floating to its true position within it. Nothing older than
    // that event's start is shown. Zero in-progress events, or MORE than one (ambiguous — deferred),
    // fall back to origin = now. Tasks are never "in progress" for this purpose — events only.
    // canvas top = origin. Normally origin = now (now-bar pinned at top). EXCEPTION: when one or
    // more events are in progress, origin backs up to the EARLIEST start among them, so every
    // in-progress event renders in full (with the now-bar floating to its true position within

    var originMin = packFromMin;
    if (inProgressEvents.length >= 1){
      originMin = inProgressEvents.reduce(function(m,b){ return Math.min(m, b.s); }, packFromMin);
    }

    // bottom = end of the last fitted thing (min 90 min of runway so it never collapses)
    var lastEnd = packFromMin + 90;
    fitted.forEach(function(it){ if(it.endMin>lastEnd) lastEnd = it.endMin; });
    var spanMin = Math.max(90, lastEnd - originMin);
    var canvasH = spanMin * PX_PER_MIN;
    var yOf = function(m){ return (m - originMin) * PX_PER_MIN; };
    var HATCH = function(rgb){ return "repeating-linear-gradient(45deg,"+
      "rgba("+rgb+",0.55) 0,rgba("+rgb+",0.55) 7px,rgba("+rgb+",0.14) 7px,rgba("+rgb+",0.14) 14px)"; };

    // OWNER → COLOR PALETTE. Source-calendar owner ("me"/"her") drives the reserved-block colors.
    // Signaling principle: one channel per signal. Hatching signals prep-vs-travel, so hatch TEXT is
    // pure black (no tinted ink competing as a second weak signal). Event blocks are FULLY SATURATED
    // with white text (like tasks) so they read as confirmed/solid, not tentative — a desaturated
    // block makes the scanner stop and check if it's real. (Named developer-constant; easy to retune.)
    var OWNER_PALETTE = {
      me: {  // Mark — warm family: yellow prep → orange travel → Crayola-green event
        prepRGB:"244,194,13", prepEdge:"#e6cf6f",
        travRGB:"245,123,19", travEdge:"#e0a066",
        evBg:"#1CAC78", evEdge:"#158a60"
      },
      her: { // Anastasia — fuchsia family: light-fuchsia prep → mid-fuchsia travel → #EC5F9A event
        prepRGB:"245,150,190", prepEdge:"#f0a8c8",
        travRGB:"238,110,168", travEdge:"#ee88b4",
        evBg:"#EC5F9A", evEdge:"#c94a80"
      }
    };
    var HATCH_INK = "#000";   // hatch labels: pure black (hatching carries the signal)
    var EVENT_INK = "#fff";   // solid event labels: white on saturated fill (like tasks)
    var paletteFor = function(owner){ return OWNER_PALETTE[owner] || OWNER_PALETTE.me; };

    var canvasKids = [];

    // ---- EVENT COLLISION COLUMNS ----------------------------------------------------------
    // Two events collide when their FULL reserved blocks (prep+travel+event) overlap in time.
    // Colliding events lay side-by-side: Mark (owner "me") on the LEFT, Anastasia ("her") on the
    // RIGHT — so column position itself signals whose event it is. Same-owner overlaps (rare
    // double-book) split that owner's side further. Non-colliding events stay full width.
    // Reserved span = [reserveStart(prepStartMin), endMin]. Column geometry is attached to each
    // appt as colFrac {L,R} in 0..1 across the block area, consumed by the segment renderer.
    (function assignColumns(){
      var apptItems = fitted.filter(function(it){ return it.type==="appt"; });
      // reserved span helpers
      var spanA = function(it){ return it.prepStartMin; };  // earliest reserved edge
      var spanB = function(it){ return it.endMin; };        // event end
      // find connected overlap groups (transitive: A-B overlap, B-C overlap → {A,B,C} one group)
      var used = {};
      apptItems.forEach(function(seed, si){
        if (used[si]) return;
        var group = [si]; used[si] = true;
        // grow the group by any item overlapping ANY member's reserved span
        var grew = true;
        while (grew){ grew = false;
          apptItems.forEach(function(cand, ci){
            if (used[ci]) return;
            var overlapsGroup = group.some(function(gi){
              return spanA(apptItems[ci]) < spanB(apptItems[gi]) && spanA(apptItems[gi]) < spanB(apptItems[ci]);
            });
            if (overlapsGroup){ group.push(ci); used[ci]=true; grew=true; }
          });
        }
        // assign columns within the group. Default full width if group of 1.
        if (group.length === 1){ apptItems[group[0]].colFrac = {L:0, R:1}; return; }
        // split by owner side: me → left half, her → right half; within a side, sub-split by count.
        var meIdx = group.filter(function(gi){ return apptItems[gi].owner!=="her"; });
        var herIdx = group.filter(function(gi){ return apptItems[gi].owner==="her"; });
        var bothSides = meIdx.length>0 && herIdx.length>0;
        function place(idxList, sideL, sideR){
          var n = idxList.length; if (!n) return;
          var w = (sideR - sideL) / n;
          idxList.forEach(function(gi, k){ apptItems[gi].colFrac = {L: sideL + k*w, R: sideL + (k+1)*w}; });
        }
        if (bothSides){ place(meIdx, 0, 0.5); place(herIdx, 0.5, 1); }
        else { place(group, 0, 1); } // all same owner → split evenly across full width
      });
    })();


    // hour grid + labels
    for (var hm = Math.ceil(originMin/60)*60; hm <= lastEnd; hm += 60){
      canvasKids.push(h("div",{key:"g"+hm,style:{position:"absolute",left:44,right:0,top:yOf(hm),
        borderTop:"1px solid "+C.line,pointerEvents:"none"}}));
      canvasKids.push(h("div",{key:"gl"+hm,style:{position:"absolute",left:0,width:40,top:yOf(hm)-7,
        textAlign:"right",fontSize:10,color:C.faint,fontVariantNumeric:"tabular-nums",pointerEvents:"none"}}, fmtMin(hm)));
    }
    // 15-minute tick marks — short left-axis marks at :15/:30/:45 (hours already have full lines).
    // Lets the eye COUNT quarter-hour units an event spans instead of calculating from hour lines.
    for (var qm = Math.ceil(originMin/15)*15; qm <= lastEnd; qm += 15){
      if (qm % 60 === 0) continue; // hour marks already drawn as full lines
      canvasKids.push(h("div",{key:"q"+qm,style:{position:"absolute",left:38,width:6,top:yOf(qm),
        borderTop:"1px solid "+C.faint,opacity:.55,pointerEvents:"none"}}));
    }
    // the pack-from bar — on TODAY this is the live now-line (unchanged behaviour); on another
    // date it marks the day-start the schedule packs from. Floats to its true position.
    var nowY = yOf(packFromMin);
    canvasKids.push(h("div",{key:"nowl",style:{position:"absolute",left:0,right:0,top:nowY,
      borderTop:"2px solid "+C.nowline,zIndex:4,pointerEvents:"none"}}));
    canvasKids.push(h("div",{key:"nowll",style:{position:"absolute",left:0,width:40,top:nowY-7,textAlign:"right",
      fontSize:10,fontWeight:700,color:C.nowline,fontVariantNumeric:"tabular-nums",zIndex:4}}, fmtMin(packFromMin)));

    // blocks
    fitted.forEach(function(it,i){
      var top = Math.max(0, yOf(it.startMin));
      if (it.type==="appt"){
        // three reserved sub-segments: prep (yellow hatch) → travel (orange hatch) → event (solid).
        // Labeled with the event title so a buffer is bound to its event ("Prep: Test2").
        // In-progress events have prepStart==travelStart==eventStart, so the two hatch segments
        // are naturally skipped by the < checks — only the live event renders.
        var segs = [];
        var pal = paletteFor(it.owner);
        if (it.prepStartMin < it.travelStartMin){ segs.push({a:it.prepStartMin,b:it.travelStartMin,bg:HATCH(pal.prepRGB),edge:pal.prepEdge,lab:"Prep: "+it.title,ink:HATCH_INK}); }
        if (it.travelStartMin < it.eventStartMin){ segs.push({a:it.travelStartMin,b:it.eventStartMin,bg:HATCH(pal.travRGB),edge:pal.travEdge,lab:"Travel: "+it.title,ink:HATCH_INK}); }
        var evActive = (packFromMin>=it.eventStartMin && packFromMin<it.endMin);
        segs.push({a:it.eventStartMin,b:it.endMin,bg:pal.evBg,edge:pal.evEdge,lab:it.title,ink:EVENT_INK,solid:true,active:evActive});
        var cf = it.colFrac || {L:0, R:1};
        var split = (cf.L>0 || cf.R<1);
        // block area = from 50px (after time gutter) to 6px-from-right. Columns divide that area.
        // left = 50 + L*(area); width = (R-L)*(area); area = (100% - 50 - 6). calc handles responsive width.
        var colLeftCss = "calc(50px + "+cf.L+" * (100% - 56px)"+(split&&cf.L>0?" + 2px":"")+")";
        var colWidthCss = "calc("+(cf.R-cf.L)+" * (100% - 56px)"+(split?" - "+((cf.L>0?2:0)+(cf.R<1?2:0))+"px":"")+")";
        segs.forEach(function(sg,si){
          var segTop = Math.max(0,yOf(sg.a)), segH = Math.max(13,(sg.b-sg.a)*PX_PER_MIN-1);
          canvasKids.push(
            h("div",Object.assign({key:(it.id||"a"+i)+"-"+si,
              style:{position:"absolute",left:colLeftCss,width:colWidthCss,top:segTop,height:segH,cursor:"pointer",
              background:sg.bg,border:"1px solid "+sg.edge,borderRadius:5,padding:"2px 8px",overflow:"hidden",boxSizing:"border-box",
              WebkitUserSelect:"none",userSelect:"none",touchAction:"pan-y",
              outline:sg.active?("2px solid "+C.amber):"none"}}, pressHandlers(it,"event")),
              h("div",{style:{fontSize:10,letterSpacing:.4,textTransform:"uppercase",color:sg.ink,fontWeight:700,
                textShadow:sg.solid?"0 1px 1px rgba(0,0,0,0.25)":"none"}},
                sg.solid ? (sg.active?"Now · ":"")+"" : sg.lab),
              segH>28 ? h("div",{style:{fontSize:12.5,fontWeight:600,color:sg.ink,lineHeight:1.2,
                textShadow:sg.solid?"0 1px 1px rgba(0,0,0,0.25)":"none",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}, sg.lab) : null
            )
          );
        });
      } else {
        var sw = prioritySwatch(it.priority);
        var ph = pressHandlers(it,"task");
        var bh = Math.max(13,(it.endMin-it.startMin)*PX_PER_MIN-1);
        canvasKids.push(
          h("div",Object.assign({key:it.id||("t"+i),style:{position:"absolute",left:50,right:6,top:top,height:bh,
            background:sw.color,border:"1px solid rgba(0,0,0,0.12)",borderRadius:5,padding:"2px 8px",overflow:"hidden",
            boxSizing:"border-box",color:"#fff",WebkitUserSelect:"none",userSelect:"none",touchAction:"pan-y",
            display:"flex",alignItems:"flex-start",gap:7}},ph),
            h("button",{onClick:function(e){e.stopPropagation();toggleDone(it.id);},
              onPointerDown:function(e){e.stopPropagation();},
              onPointerUp:function(e){e.stopPropagation();},
              "aria-label":"mark done",
              style:{marginTop:2,width:14,height:14,flexShrink:0,border:"1.5px solid rgba(255,255,255,0.8)",borderRadius:3,background:"transparent",cursor:"pointer"}}),
            h("div",{style:{flex:1,minWidth:0,overflow:"hidden"}},
              h("div",{style:{fontSize:13,fontWeight:600,lineHeight:1.2,textShadow:"0 1px 1px rgba(0,0,0,0.25)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}, it.title),
              bh>30 ? h("div",{style:{fontSize:10.5,opacity:0.92,fontVariantNumeric:"tabular-nums",marginTop:1}}, it.schStart+"–"+it.schEnd+" · "+minToLabel(it.dur)) : null
            )
          )
        );
      }
    });

    var canvas = h("div",{key:"canvas",style:{position:"relative",height:canvasH,marginTop:6}}, canvasKids);

    var railWrap = h("div",{key:"rail",style:{border:"1px solid "+C.line,borderRadius:4,padding:"12px 10px 14px 12px",
      background:"rgba(255,255,255,0.4)",overflow:"hidden"}}, canvas);

    var children = [];

    // ALL-DAY FLAG BAND — day-level flags (e.g. MOFF), rendered as chips above the timeline,
    // NOT on it (they have no start/end). Colored by owner. Nothing renders if none today.
    if (allDayFlags && allDayFlags.length){
      var flagChips = allDayFlags.map(function(f,fi){
        var isHer = f.owner==="her";
        var chipBg = isHer ? "#EC5F9A" : "#1CAC78";
        var chipEdge = isHer ? "#c94a80" : "#158a60";
        return h("div",{key:f.id||("flag"+fi),title:f.title,style:{display:"inline-flex",alignItems:"center",gap:5,
          background:chipBg,border:"1px solid "+chipEdge,color:"#fff",borderRadius:5,padding:"3px 9px",
          fontSize:11.5,fontWeight:600,textShadow:"0 1px 1px rgba(0,0,0,0.2)",maxWidth:180,
          whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},
          h("span",{style:{fontSize:9,opacity:0.85,textTransform:"uppercase",letterSpacing:0.4}}, isHer?"A":"M"),
          f.title);
      });
      children.push(h("div",{key:"flagband",style:{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8,
        paddingBottom:8,borderBottom:"1px solid "+C.panelEdge}}, flagChips));
    }

    children.push(railWrap);

    // overflow (past-horizon) tasks — listed in flow below the canvas, dashed, priority-colored
    if (unfittedItems.length){
      var ofKids = [ h("div",{key:"ofhead",style:{display:"flex",alignItems:"center",gap:8,margin:"2px 0 10px"}},
        h("span",{style:{fontSize:10,letterSpacing:1,textTransform:"uppercase",color:C.cold,fontWeight:700}}, "Doesn't fit before the horizon"),
        h("span",{style:{flex:1,height:1,background:C.panelEdge}})) ];
      unfittedItems.forEach(function(it,i){
        var sw = prioritySwatch(it.priority);
        var ph = pressHandlers(it,"task");
        ofKids.push(
          h("div",Object.assign({key:it.id||("u"+i),style:{border:"1px dashed "+sw.color,borderLeft:"5px solid "+sw.color,
            background:C.panel,borderRadius:3,padding:"9px 12px",marginBottom:8,display:"flex",gap:10,alignItems:"flex-start",
            WebkitUserSelect:"none",userSelect:"none",touchAction:"pan-y"}},ph),
            h("button",{onClick:function(e){e.stopPropagation();toggleDone(it.id);},
              onPointerDown:function(e){e.stopPropagation();},
              onPointerUp:function(e){e.stopPropagation();},
              "aria-label":"mark done",
              style:{marginTop:2,width:16,height:16,flexShrink:0,border:"1.5px solid "+C.faint,borderRadius:3,background:"transparent",cursor:"pointer"}}),
            h("div",{style:{flex:1,minWidth:0}},
              h("div",{style:{fontSize:14,color:C.ink,fontWeight:500,lineHeight:1.3}}, it.title),
              h("div",{style:{display:"flex",gap:10,marginTop:4,flexWrap:"wrap",alignItems:"center"}},
                h("span",{style:{fontSize:11,color:C.cold}}, "doesn't fit ahead · "+minToLabel(it.dur)),
                spoonDots(it.effort, sw.color)))
          )
        );
      });
      children.push(h("div",{key:"overflow",style:{marginTop:12}}, ofKids));
    }

    if (fitted.length===0 && unfittedItems.length===0){
      children.push(h("div",{key:"empty",style:{fontSize:13,color:C.faint,fontStyle:"italic",padding:"10px 2px"}}, "Nothing scheduled ahead. Capture something below."));
    }

    var sortBtns = Object.keys(SORTS).map(function(k){
      var on = k===sortKey, sdef = SORTS[k];
      return h("button",{key:k,onClick:function(){setSortKey(k);},style:{border:"1px solid "+(on?C.amber:C.panelEdge),background:on?C.amberSoft:"transparent",color:on?C.ink:C.sub,borderRadius:2,padding:"6px 10px",cursor:"pointer",textAlign:"left",lineHeight:1.15}},
        h("div",{style:{fontSize:13,fontWeight:600}}, sdef.label),
        h("div",{style:{fontSize:10.5,color:C.faint}}, sdef.sub)
      );
    });
    var countText = sorted.active.length+" open · "+minToLabel(totalForeground)+" of focus";
    if (schedule.unfittedCount>0){ countText += " · "+schedule.unfittedCount+" past horizon"; }
    if (sorted.dormant.length>0){ countText += " · "+sorted.dormant.length+" scheduled ahead"; }
    sortBtns.push(h("div",{key:"count",style:{marginLeft:"auto",alignSelf:"center",fontSize:11.5,color:C.faint}}, countText));
    children.push(h("div",{key:"sorts",style:{display:"flex",flexWrap:"wrap",gap:6,margin:"16px 0 0"}}, sortBtns));

    children.push(
      h("div",{key:"capture",style:{marginTop:18,paddingTop:16,borderTop:"1px solid "+C.line}},
        h(TaskForm,{ mode:"capture", initial:{}, onSubmit:submitNewTask })
      )
    );

    if (dayHistory.combined.length>0){
      var histRows = dayHistory.combined.map(function(hh){
        return h("div",{key:hh.key,style:{display:"flex",gap:10,alignItems:"center",marginBottom:6}},
          hh.kind==="task"
            ? h("span",{style:{width:16,height:16,borderRadius:3,background:C.good,color:"#fff",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:11,flexShrink:0}}, "✓")
            : h("span",{style:{width:16,height:16,borderRadius:3,background:C.fixed,color:"#fff",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:9,flexShrink:0}}, "▦"),
          h("span",{style:{fontSize:13,color:C.faint,textDecoration:hh.kind==="task"?"line-through":"none"}}, hh.title),
          hh.kind==="appt" ? h("span",{style:{fontSize:10.5,color:C.faint}}, "· "+hh.start+"–"+hh.end) : null,
          hh.kind==="task" ? h("button",{onClick:function(){toggleDone(hh.id);},style:{marginLeft:"auto",fontSize:11,color:C.faint,background:"none",border:"none",cursor:"pointer"}}, "undo") : null
        );
      });
      var headChildren = [
        h("span",{key:"tri",style:{fontSize:9,color:C.good,transform:historyOpen?"rotate(90deg)":"none",display:"inline-block"}}, "▶"),
        h("span",{key:"lbl",style:{fontSize:11,letterSpacing:1,textTransform:"uppercase",color:C.good}}, "Today, so far"),
        h("span",{key:"cnt",style:{fontSize:11,color:"#fff",background:C.good,borderRadius:9,padding:"1px 7px",fontWeight:600}}, dayHistory.combined.length)
      ];
      if (!historyOpen && dayHistory.combined[0]){
        headChildren.push(h("span",{key:"peek",style:{fontSize:12,color:C.faint,marginLeft:4,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}, "· "+dayHistory.combined[0].title));
      }
      children.push(
        h("div",{key:"hist",style:{marginTop:22,paddingTop:14,borderTop:"1px dashed "+C.panelEdge}},
          h("button",{onClick:function(){setHistoryOpen(!historyOpen);},style:{display:"flex",alignItems:"center",gap:8,width:"100%",background:"none",border:"none",cursor:"pointer",padding:0,textAlign:"left"}}, headChildren),
          historyOpen ? h("div",{style:{marginTop:10}}, histRows) : null
        )
      );
    }

    return h("section",null, children);
  }

  function eventFormNode(){
    if(!evForm) return null;
    var isEdit = evForm.mode==="edit";
    function upd(k, v){ setEvForm(function(f){ return Object.assign({}, f, {}, (function(){var o={};o[k]=v;return o;})()); }); }
    var lbl = function(t){ return h("div",{style:{fontSize:11,fontWeight:600,color:C.faint,textTransform:"uppercase",letterSpacing:.4,marginBottom:3}}, t); };
    var inputStyle = {width:"100%",boxSizing:"border-box",border:"1px solid "+C.panelEdge,borderRadius:6,padding:"9px 11px",fontSize:15,color:C.ink,background:C.paper};
    var field = function(key, label, node){ return h("div",{key:key,style:{marginBottom:12}}, lbl(label), node); };
    var body = [
      h("div",{key:"hd",style:{fontFamily:"Georgia, serif",fontSize:18,fontWeight:600,color:C.ink,marginBottom:14}},
        isEdit ? ("Edit event — " + dayLabel(evForm.onDate||todayStr()))
               : ("New event — " + dayLabel(evForm.onDate||todayStr()) + ", your calendar")),
      field("title","Title", h("input",{type:"text",value:evForm.title,placeholder:"Event title",
        onChange:function(e){ upd("title", e.target.value); }, style:inputStyle})),
      h("div",{key:"times",style:{display:"flex",gap:10,marginBottom:12}},
        h("div",{style:{flex:1}}, lbl("Start"), h("input",{type:"time",value:evForm.start,
          onChange:function(e){ upd("start", e.target.value); }, style:inputStyle})),
        h("div",{style:{flex:1}}, lbl("End"), h("input",{type:"time",value:evForm.end,
          onChange:function(e){ upd("end", e.target.value); }, style:inputStyle}))
      ),
      h("div",{key:"buf",style:{display:"flex",gap:10,marginBottom:4}},
        h("div",{style:{flex:1}}, lbl("Prep (min)"), h("input",{type:"number",min:0,step:5,value:evForm.prep,
          onChange:function(e){ upd("prep", e.target.value); }, style:inputStyle})),
        h("div",{style:{flex:1}}, lbl("Travel (min)"), h("input",{type:"number",min:0,step:5,value:evForm.travel,
          onChange:function(e){ upd("travel", e.target.value); }, style:inputStyle}))
      ),
      evForm.err ? h("div",{key:"err",style:{color:"#a23",fontSize:12.5,marginTop:8}}, evForm.err) : null,
      h("div",{key:"acts",style:{display:"flex",gap:10,marginTop:18}},
        h("button",{onClick:closeEventForm,disabled:evForm.saving,
          style:{flex:1,border:"1px solid "+C.panelEdge,background:C.paper,color:C.ink,borderRadius:6,padding:"11px 0",fontSize:14,fontWeight:600,cursor:"pointer"}}, "Cancel"),
        h("button",{onClick:saveEventForm,disabled:evForm.saving,
          style:{flex:1,border:"none",background:evForm.saving?C.faint:C.good,color:"#fff",borderRadius:6,padding:"11px 0",fontSize:14,fontWeight:700,cursor:evForm.saving?"default":"pointer"}},
          evForm.saving ? "Saving…" : (isEdit?"Save changes":"Create event"))
      )
    ];
    return h("div",{key:"evformbd",onPointerDown:function(e){ if(!evForm.saving) closeEventForm(); },
        style:{position:"fixed",inset:0,zIndex:70,background:"rgba(28,31,38,0.45)",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}},
      h("div",{onPointerDown:function(e){e.stopPropagation();},
        style:{width:"100%",maxWidth:380,background:C.panel,border:"1px solid "+C.panelEdge,borderRadius:12,padding:"20px 22px",boxShadow:"0 12px 40px rgba(28,31,38,0.28)"}},
        body)
    );
  }

  function eventPopupNode(){
    if(!evPopup) return null;
    var ev = appts.filter(function(x){return x.id===evPopup.id;})[0];
    if(!ev) return null;
    var vw = (typeof window!=="undefined") ? window.innerWidth : 380;
    var vh = (typeof window!=="undefined") ? window.innerHeight : 700;
    var W = 280;
    var x = Math.min(evPopup.x, vw - W - 10); if(x<10) x=10;
    var y = Math.min(evPopup.y, vh - 200); if(y<10) y=10;
    var ownerName = ev.owner==="her" ? "Anastasia" : "Mark";
    var ownerColor = ev.owner==="her" ? "#EC5F9A" : "#1CAC78";
    var rows = [];
    rows.push(h("div",{key:"t",style:{fontSize:15,fontWeight:700,color:C.ink,marginBottom:4,lineHeight:1.25}}, ev.title));
    rows.push(h("div",{key:"tm",style:{fontSize:13,color:C.sub,fontVariantNumeric:"tabular-nums"}}, ev.start+"–"+ev.end));
    rows.push(h("div",{key:"ow",style:{display:"flex",alignItems:"center",gap:6,fontSize:12.5,color:C.sub,marginTop:6}},
      h("span",{style:{width:9,height:9,borderRadius:2,background:ownerColor,display:"inline-block"}}), ownerName+"'s calendar"));
    // prep/travel (the app's estimate or the event's set values)
    rows.push(h("div",{key:"pt",style:{fontSize:12,color:C.faint,marginTop:2}},
      "Prep "+ (ev.prep!=null?ev.prep:0) +"m · Travel "+ (ev.travel!=null?ev.travel:0) +"m"));
    if(ev.location){ rows.push(h("div",{key:"loc",style:{fontSize:12.5,color:C.sub,marginTop:6}}, "📍 "+ev.location)); }
    if(ev.description){ rows.push(h("div",{key:"desc",style:{fontSize:12.5,color:C.sub,marginTop:6,whiteSpace:"pre-wrap",maxHeight:120,overflow:"auto"}}, ev.description)); }
    rows.push(h("button",{key:"editbtn",onClick:function(e){ e.stopPropagation(); openEventEdit(ev.id); },
      style:{marginTop:10,border:"1px solid "+C.panelEdge,background:C.paper,borderRadius:5,padding:"7px 13px",
        fontSize:13,fontWeight:600,color:C.ink,cursor:"pointer",width:"100%"}}, "Edit event"));
    function bd(e){ if(swallowNextBackdrop.current){ swallowNextBackdrop.current=false; return; } setEvPopup(null); }
    return h("div",{key:"evbackdrop",onPointerDown:bd,onContextMenu:function(e){e.preventDefault();bd(e);},
        style:{position:"fixed",inset:0,zIndex:50,background:"rgba(28,31,38,0.04)"}},
      h("div",{onPointerDown:function(e){e.stopPropagation();},
        style:{position:"fixed",left:x,top:y,zIndex:51,width:W,background:C.panel,border:"1px solid "+C.panelEdge,
          borderRadius:8,padding:"12px 14px",boxShadow:"0 8px 28px rgba(28,31,38,0.18)"}},
        rows)
    );
  }

  // TASK read-only detail popup (TAP). Mirrors the event detail: full expandable title + fields +
  // an Edit button. The quick priority/edit menu (popupNode) is the PRESS-HOLD gesture instead.
  function taskDetailNode(){
    if(!taskPopup) return null;
    var t = tasks.filter(function(x){return x.id===taskPopup.id;})[0];
    if(!t) return null;
    var vw = (typeof window!=="undefined") ? window.innerWidth : 380;
    var vh = (typeof window!=="undefined") ? window.innerHeight : 700;
    var W = 280;
    var x = Math.min(taskPopup.x, vw - W - 10); if(x<10) x=10;
    var y = Math.min(taskPopup.y, vh - 200); if(y<10) y=10;
    var sw = prioritySwatch(t.priority);
    var rows = [];
    // full title — wraps and expands as needed (no truncation, unlike the canvas chip)
    rows.push(h("div",{key:"t",style:{fontSize:15,fontWeight:700,color:C.ink,marginBottom:6,lineHeight:1.3,whiteSpace:"pre-wrap",wordBreak:"break-word"}}, t.title));
    var meta = [];
    meta.push(h("span",{key:"pri",style:{display:"inline-flex",alignItems:"center",gap:5,fontSize:12.5,color:C.sub}},
      h("span",{style:{width:9,height:9,borderRadius:2,background:sw.color,display:"inline-block"}}), "priority "+t.priority));
    meta.push(h("span",{key:"eff",style:{fontSize:12.5,color:C.sub}}, "effort \u2248"+minToLabel(SPOON_MIN[t.effort])));
    rows.push(h("div",{key:"m",style:{display:"flex",gap:12,flexWrap:"wrap",alignItems:"center",marginBottom:2}}, meta));
    if(t.showOn){ rows.push(h("div",{key:"so",style:{fontSize:12.5,color:C.sub,marginTop:4}}, "shows on "+t.showOn + (t.fireAt?(" \u00b7 fires "+t.fireAt+(t.warnMin?(" (\u2212"+t.warnMin+"m)"):"")):""))); }
    if(t.seriesId){ rows.push(h("div",{key:"sr",style:{fontSize:11.5,color:C.faint,marginTop:4,fontStyle:"italic"}}, "part of a recurring series")); }
    rows.push(h("button",{key:"editbtn",onClick:function(e){ e.stopPropagation(); setTaskPopup(null); openEditor(t.id); },
      style:{marginTop:12,border:"1px solid "+C.panelEdge,background:C.paper,borderRadius:5,padding:"7px 13px",
        fontSize:13,fontWeight:600,color:C.ink,cursor:"pointer",width:"100%"}}, "Edit"));
    function bd(e){ if(swallowNextBackdrop.current){ swallowNextBackdrop.current=false; return; } setTaskPopup(null); }
    return h("div",{key:"tdbackdrop",onPointerDown:bd,onContextMenu:function(e){e.preventDefault();bd(e);},
        style:{position:"fixed",inset:0,zIndex:50,background:"rgba(28,31,38,0.04)"}},
      h("div",{onPointerDown:function(e){e.stopPropagation();},
        style:{position:"fixed",left:x,top:y,zIndex:51,width:W,background:C.panel,border:"1px solid "+C.panelEdge,
          borderRadius:8,padding:"12px 14px",boxShadow:"0 8px 28px rgba(28,31,38,0.18)"}},
        rows)
    );
  }

  function popupNode(){
    if(!popup) return null;
    var task = tasks.filter(function(x){return x.id===popup.id;})[0];
    if(!task) return null;
    // clamp so the menu stays on-screen. width ~ edit btn + 5 swatches; height one row (or two if editing).
    var vw = (typeof window!=="undefined") ? window.innerWidth : 380;
    var vh = (typeof window!=="undefined") ? window.innerHeight : 700;
    var W = 250, Hpop = 60;
    var x = Math.min(popup.x, vw - W - 10); if(x<10) x=10;
    var y = Math.min(popup.y, vh - Hpop - 10); if(y<10) y=10;
    // Edit launches the inline card field and closes the popup.
    var actionBtn = h("button",{key:"edit",onClick:function(e){ e.stopPropagation(); openEditor(task.id); },
          style:{border:"1px solid "+C.panelEdge,background:C.paper,borderRadius:4,padding:"7px 12px",fontSize:13,fontWeight:600,color:C.ink,cursor:"pointer",whiteSpace:"nowrap"}}, "Edit");
    var menuChildren = [
      h("div",{key:"row",style:{display:"flex",alignItems:"center",gap:12}},
        actionBtn,
        // a swatch press sets priority, persists, and closes the popup — one gesture.
        swatchRow(task.priority, function(v){ setPriorityFor(task.id, v); closePopup(); }, 24)
      )
    ];
    function backdropClose(e){
      if(swallowNextBackdrop.current){ swallowNextBackdrop.current=false; return; } // opening gesture's own tail
      closePopup();
    }
    return h("div",{key:"backdrop",onPointerDown:backdropClose,onContextMenu:function(e){e.preventDefault();backdropClose(e);},
        style:{position:"fixed",inset:0,zIndex:50,background:"rgba(28,31,38,0.04)"}},
      h("div",{onPointerDown:function(e){e.stopPropagation();},
        style:{position:"fixed",left:x,top:y,zIndex:51,background:C.panel,border:"1px solid "+C.panelEdge,
          borderRadius:8,padding:"10px 12px",boxShadow:"0 8px 28px rgba(28,31,38,0.18)"}},
        menuChildren)
    );
  }

  function firePromptNode(){
    if (!activePrompt) return null;
    var t = tasks.filter(function(x){return x.id===activePrompt.id;})[0];
    if (!t){ return null; }
    var isWarn = activePrompt.stage==="warn";
    var sw = prioritySwatch(t.priority);
    // stage labels (all-P): Prepare = warn, Proceed = event-leaving (future), Perform = fire-at/do.
    var STAGE_LABELS = { warn:"Prepare", proceed:"Proceed", begin:"Perform" };
    var stageLabel = STAGE_LABELS[activePrompt.stage] || "Perform";
    var stageSub = isWarn ? ("In "+t.warnMin+" min · "+t.fireAt) : ("Now · "+t.fireAt);
    var snoozeBtns = [5,15,30].map(function(m){
      return h("button",{key:m,onClick:function(){ snoozePrompt(m); },
        style:{flex:1,border:"1px solid "+C.panelEdge,background:C.panel,color:C.ink,borderRadius:6,padding:"12px 0",fontSize:14,fontWeight:600,cursor:"pointer"}}, "+"+m+"m");
    });
    return h("div",{key:"firebackdrop",style:{position:"fixed",inset:0,zIndex:80,background:"rgba(28,31,38,0.55)",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}},
      h("div",{style:{width:"100%",maxWidth:380,background:C.paper,borderRadius:14,borderTop:"6px solid "+sw.color,padding:"26px 22px 20px",boxShadow:"0 18px 50px rgba(0,0,0,0.35)"}},
        h("div",{style:{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:isWarn?C.cold:C.amber,fontWeight:700,marginBottom:6}}, stageLabel),
        h("div",{style:{fontSize:22,fontWeight:600,color:C.ink,lineHeight:1.25,fontFamily:"Georgia, serif"}}, t.title),
        h("div",{style:{fontSize:12.5,color:C.sub,marginTop:8}}, stageSub),
        h("div",{style:{display:"flex",gap:8,marginTop:22}}, snoozeBtns),
        h("button",{onClick:dismissPrompt,style:{width:"100%",marginTop:10,background:C.ink,color:C.paper,border:"none",borderRadius:6,padding:"13px 0",fontSize:14,fontWeight:600,cursor:"pointer"}}, "Dismiss")
      )
    );
  }

  function editModalNode(){
    if (editId==null) return null;
    var t = tasks.filter(function(x){return x.id===editId;})[0];
    if (!t){ return null; }
    var body;
    if (confirmDel){
      var inSeries = !!t.seriesId;
      body = h("div",null,
        h("div",{style:{fontSize:16,fontWeight:600,color:C.ink,marginBottom:8}}, inSeries?"Delete recurring task?":"Delete this task?"),
        h("div",{style:{fontSize:13,color:C.sub,marginBottom:18}}, "\u201C"+t.title+"\u201D" + (inSeries?" is part of a series.":" will be permanently removed.")),
        inSeries
          ? h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
              h("button",{onClick:function(){ deleteTask("one"); },style:{border:"none",background:"#c25",color:"#fff",borderRadius:6,padding:"11px 0",fontSize:13,fontWeight:600,cursor:"pointer"}}, "Delete this one"),
              h("button",{onClick:function(){ deleteTask("following"); },style:{border:"none",background:"#c25",color:"#fff",borderRadius:6,padding:"11px 0",fontSize:13,fontWeight:600,cursor:"pointer"}}, "Delete this and following"),
              h("button",{onClick:function(){ setConfirmDel(false); },style:{border:"1px solid "+C.panelEdge,background:"transparent",color:C.sub,borderRadius:6,padding:"11px 0",fontSize:13,fontWeight:600,cursor:"pointer"}}, "Keep")
            )
          : h("div",{style:{display:"flex",gap:8}},
              h("button",{onClick:function(){ setConfirmDel(false); },style:{flex:1,border:"1px solid "+C.panelEdge,background:"transparent",color:C.sub,borderRadius:6,padding:"11px 0",fontSize:13,fontWeight:600,cursor:"pointer"}}, "Keep"),
              h("button",{onClick:function(){ deleteTask("one"); },style:{flex:1,border:"none",background:"#c25",color:"#fff",borderRadius:6,padding:"11px 0",fontSize:13,fontWeight:600,cursor:"pointer"}}, "Delete")
            )
      );
    } else {
      var scopeSel = t.seriesId ? h("div",{style:{marginBottom:14,padding:"10px 12px",border:"1px solid "+C.panelEdge,borderRadius:6,background:C.panel}},
        h("div",{style:{fontSize:11,textTransform:"uppercase",letterSpacing:.4,color:C.faint,fontWeight:700,marginBottom:8}}, "Recurring task — apply to"),
        h("div",{style:{display:"flex",gap:8}},
          [["one","This one"],["following","This and following"]].map(function(o){
            var on = editScope===o[0];
            return h("button",{key:o[0],onClick:function(){ setEditScope(o[0]); },
              style:{flex:1,border:"1px solid "+(on?C.ink:C.panelEdge),background:on?C.ink:"transparent",color:on?C.paper:C.sub,borderRadius:6,padding:"8px 0",fontSize:12.5,fontWeight:600,cursor:"pointer"}}, o[1]);
          })),
        h("div",{style:{fontSize:10.5,color:C.faint,fontStyle:"italic",marginTop:8}},
          "Changes content only. To change the cadence, delete this-and-following and make a new series.")
      ) : null;
      body = h("div",null, scopeSel, h(TaskForm,{ mode:"edit",
        initial:{ title:t.title, effort:t.effort, priority:t.priority, showOn:t.showOn, fireAt:t.fireAt, warnMin:t.warnMin },
        onSubmit:function(fields){ saveEdit(fields, editScope); },
        onComplete:function(fields){ if(fields){ saveEdit(fields, "one", true); } else { setEditId(null); } },
        onCancel:function(){ setEditId(null); },
        onDelete:function(){ setConfirmDel(true); } }));
    }
    return h("div",{key:"editbackdrop",onClick:function(){ if(!confirmDel) setEditId(null); },
        style:{position:"fixed",inset:0,zIndex:70,background:"rgba(28,31,38,0.45)",display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"40px 18px",overflowY:"auto"}},
      h("div",{onClick:function(e){e.stopPropagation();},
        style:{width:"100%",maxWidth:440,background:C.paper,borderRadius:12,padding:"22px 20px",boxShadow:"0 18px 50px rgba(0,0,0,0.3)"}},
        h("div",{style:{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:C.faint,fontWeight:700,marginBottom:14}}, confirmDel?"Confirm":"Edit task"),
        body)
    );
  }

  var tabBtns = [["foreground","Tasks"],["relax","Relax"],["morning","Morning"],["evening","Evening"]].map(function(pair){
    var k=pair[0], label=pair[1], on=tab===k;
    return h("button",{key:k,onClick:function(){setTab(k);},style:{flex:1,border:"1px solid "+(on?C.amber:C.panelEdge),background:on?C.amberSoft:"transparent",color:on?C.ink:C.sub,borderRadius:2,padding:"9px 6px",fontSize:13,fontWeight:600,cursor:"pointer"}}, label);
  });

  return h("div",{style:{minHeight:"100vh"}},
    firePromptNode(),
    editModalNode(),
    popupNode(),
    eventPopupNode(),
    taskDetailNode(),
    eventFormNode(),
    h("header",{style:{maxWidth:640,margin:"0",padding:"max(28px, env(safe-area-inset-top)) 24px 10px"}},
      h("div",{style:{display:"flex",alignItems:"baseline",justifyContent:"space-between",flexWrap:"wrap",gap:8}},
        h("h1",{style:{margin:0,fontFamily:"Georgia, serif",fontSize:22,fontWeight:600,letterSpacing:-0.2}}, "My Intentional Life v0.8.1"),
        h("div",{style:{fontSize:12.5,color:C.sub,fontStyle:"italic"}}, "The important that is placed and the urgent that is done")
      ),
      h("div",{id:"status-bar",style:{color:(status.indexOf("Could not")===0||status.indexOf("failed")>-1)?"#a23":C.faint}}, status),
      // DATE SELECTOR — roll through days one at a time. Today is the default and the special
      // case; any other date is the forward (or backward) view.
      h("div",{style:{display:"flex",alignItems:"center",gap:6,margin:"2px 0 6px",flexWrap:"wrap"}},
        h("button",{onClick:function(){ setViewDate(shiftDate(viewDate,-1)); },
          style:{border:"1px solid "+C.panelEdge,background:"transparent",color:C.sub,borderRadius:5,padding:"5px 10px",fontSize:13,fontWeight:700,cursor:"pointer"}}, "\u2039"),
        h("input",{type:"date",value:viewDate,onChange:function(e){ if(e.target.value) setViewDate(e.target.value); },
          style:{border:"1px solid "+C.panelEdge,background:C.paper,color:C.ink,borderRadius:5,padding:"4px 8px",fontSize:13,fontWeight:600}}),
        h("button",{onClick:function(){ setViewDate(shiftDate(viewDate,1)); },
          style:{border:"1px solid "+C.panelEdge,background:"transparent",color:C.sub,borderRadius:5,padding:"5px 10px",fontSize:13,fontWeight:700,cursor:"pointer"}}, "\u203a"),
        !isToday ? h("button",{onClick:function(){ setViewDate(todayStr()); },
          style:{border:"1px solid "+C.amber,background:C.amberSoft,color:C.ink,borderRadius:5,padding:"5px 11px",fontSize:12,fontWeight:700,cursor:"pointer"}}, "Today") : null,
        !isToday ? h("span",{style:{fontSize:11.5,color:C.faint}}, dayLabel(viewDate)) : null
      ),
      // PACK-FROM control — only on non-today dates (today packs from the live clock).
      // Midnight clusters the day's tasks before the first event (tasks effectively separate);
      // the day-start time interleaves them with events via the existing packing logic.
      !isToday ? h("div",{style:{display:"flex",alignItems:"center",gap:6,margin:"0 0 6px",flexWrap:"wrap"}},
        h("span",{style:{fontSize:11,textTransform:"uppercase",letterSpacing:.4,color:C.faint,fontWeight:700}}, "Pack from"),
        h("input",{type:"time",value:fmtMin(dayStartMin),
          onChange:function(e){ if(e.target.value){ var p=e.target.value.split(":"); setDayStartMin((+p[0])*60+(+p[1])); } },
          style:{border:"1px solid "+C.panelEdge,background:C.paper,color:C.ink,borderRadius:5,padding:"4px 8px",fontSize:13,fontWeight:600}}),
        h("button",{onClick:function(){ setDayStartMin(0); },
          style:{border:"1px solid "+C.panelEdge,background:dayStartMin===0?C.amberSoft:"transparent",color:C.sub,borderRadius:5,padding:"4px 9px",fontSize:11.5,fontWeight:600,cursor:"pointer"}}, "Midnight"),
        h("button",{onClick:function(){ setDayStartMin(8*60); },
          style:{border:"1px solid "+C.panelEdge,background:dayStartMin===8*60?C.amberSoft:"transparent",color:C.sub,borderRadius:5,padding:"4px 9px",fontSize:11.5,fontWeight:600,cursor:"pointer"}}, "Day start")
      ) : null,
      // Calendar connection control
      h("div",{style:{display:"flex",alignItems:"center",gap:10,margin:"2px 0 6px"}},
        (calState==="connected")
          ? h("button",{onClick:function(){ refreshCalendar(viewDate); },style:{border:"1px solid "+C.panelEdge,background:"transparent",color:C.sub,borderRadius:5,padding:"5px 11px",fontSize:12,fontWeight:600,cursor:"pointer"}}, "\u21bb Calendar")
          : h("button",{onClick:connectCalendar,disabled:calState==="connecting",style:{border:"none",background:calState==="connecting"?C.faint:C.good,color:"#fff",borderRadius:5,padding:"6px 13px",fontSize:12,fontWeight:600,cursor:calState==="connecting"?"default":"pointer"}}, calState==="connecting"?"Connecting\u2026":"Connect Calendar"),
        (calState==="connected")
          ? h("button",{onClick:openEventCreate,style:{border:"1px solid "+C.good,background:"transparent",color:C.good,borderRadius:5,padding:"5px 11px",fontSize:12,fontWeight:700,cursor:"pointer"}}, "+ Event")
          : null,
        calMsg ? h("span",{style:{fontSize:11.5,color:calState==="error"?"#a23":C.faint}}, calMsg) : null
      ),
      h("div",{style:{height:1,background:C.panelEdge}})
    ),
    h("div",{className:"il-tabs",style:{maxWidth:640,margin:"0",padding:"10px 24px 0",gap:6}}, tabBtns),
    h("main",{style:{maxWidth:640,margin:"0",padding:"18px 24px calc(60px + env(safe-area-inset-bottom))"}},
      tab==="relax" ? relaxView()
        : tab==="morning" ? morningProcess()
        : tab==="evening" ? eveningProcess()
        : foreground()
    )
  );
}

var leadStyle = { margin:"0 0 16px", fontSize:12.5, color:C.sub, lineHeight:1.5, maxWidth:"42ch" };

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>

</body>
</html>
