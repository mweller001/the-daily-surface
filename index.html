<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f3f1ec" />
<title>My Intentional Life</title>
<link rel="manifest" href="manifest.json" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #f3f1ec; color: #1c1f26;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-text-size-adjust: 100%;
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  button:focus-visible, input:focus-visible { outline: 2px solid #c8741a; outline-offset: 2px; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: #d8d3c8; border-radius: 4px; }
  .il-cols { display: grid; grid-template-columns: 1.35fr 1fr 1fr; gap: 18px; }
  .il-tabs { display: none; }
  @media (max-width: 860px) {
    .il-cols { display: block; }
    .il-cols > section { display: none; }
    .il-cols > section.il-active { display: block; }
    .il-tabs { display: flex; }
  }
  #status-bar { font-size: 12px; padding: 4px 0; min-height: 20px; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script>
// ============================================================
//  CONFIG — your Supabase project
// ============================================================
const SUPABASE_URL = "https://vjkuksmwycnklkfpngtq.supabase.co";
const SUPABASE_KEY = "sb_publishable_2gnanut8Zvt6cyt8BBCUfw_e4ZU81YA";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================================
//  Data layer — schema-light against the `items` table.
//  Every row: { id, kind, data:{...}, created_at, updated_at }.
//  Reads are TOLERANT: missing fields get defaults so old records survive
//  shape changes. This is what lets the data layer iterate fast.
// ============================================================
const Store = {
  async loadAll() {
    const { data, error } = await db.from("items").select("*");
    if (error) throw error;
    return data || [];
  },
  async add(kind, dataObj) {
    const { data, error } = await db.from("items").insert([{ kind, data: dataObj }]).select();
    if (error) throw error;
    return data[0];
  },
  async update(id, dataObj) {
    const { data, error } = await db.from("items").update({ data: dataObj }).eq("id", id).select();
    if (error) throw error;
    return data[0];
  },
  async remove(id) {
    const { error } = await db.from("items").delete().eq("id", id);
    if (error) throw error;
  },
};

// tolerant reader: turn a raw row into a task with safe defaults
function readTask(row) {
  const d = row.data || {};
  return {
    id: row.id,
    title: d.title || "(untitled)",
    project: d.project || "—",
    priority: typeof d.priority === "number" ? d.priority : 5,
    effort: typeof d.effort === "number" ? d.effort : 2,
    note: d.note || "",
    done: !!d.done,
    background: !!d.background,
    updated_at: row.updated_at,
  };
}
function readAppt(row) {
  const d = row.data || {};
  return { id: row.id, title: d.title || "(appointment)", start: d.start || "09:00", end: d.end || "10:00" };
}
</script>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useCallback, useEffect } = React;

const C = {
  ink: "#1c1f26", paper: "#f3f1ec", panel: "#ffffff", panelEdge: "#e2ded4",
  sub: "#6b6f78", faint: "#9b9ea6", rail: "#d8d3c8",
  fixed: "#3a4250", amber: "#c8741a", amberSoft: "#f0e2cf",
  cold: "#5b6f8c", line: "#eae6dd", good: "#5d7052", nowline: "#c8741a",
};
const SPOON_MIN = { 1: 15, 2: 30, 3: 60, 4: 120, 5: 180 };

const SORTS = {
  default: { label: "Default", sub: "priority, then heaviest", fn: (a, b) => b.priority - a.priority || b.effort - a.effort },
  light: { label: "Quick first", sub: "lightest, then priority", fn: (a, b) => a.effort - b.effort || b.priority - a.priority },
  prioLight: { label: "Priority · light", sub: "priority, then lightest", fn: (a, b) => b.priority - a.priority || a.effort - b.effort },
};
const FIT_LEVELS = [
  { v: 11, label: "Strict", sub: "sort only, no fitting" },
  { v: 8, label: "High only", sub: "fit ≥8 priority" },
  { v: 5, label: "Medium+", sub: "fit ≥5 priority" },
  { v: 0, label: "Fit all", sub: "fit anything that fits" },
];

const fmtMin = (mm) => `${String(Math.floor(mm/60)%24).padStart(2,"0")}:${String(mm%60).padStart(2,"0")}`;
function minToLabel(min){ if(min<60) return `${min}m`; const h=Math.floor(min/60),m=min%60; return m?`${h}h${m}`:`${h}h`; }
function priorityTone(p){ if(p>=8) return C.amber; if(p>=5) return "#a8843e"; return C.cold; }
function nowMinutes(){ const d=new Date(); return d.getHours()*60 + d.getMinutes(); }

function App() {
  const [loading, setLoading] = useState(true);
  const [status, setStatus] = useState("");
  const [tab, setTab] = useState("foreground");
  const [sortKey, setSortKey] = useState("default");
  const [fitLevel, setFitLevel] = useState(8);
  const [sizeThreshold] = useState(15);
  const [tasks, setTasks] = useState([]);       // includes background-flagged
  const [appts, setAppts] = useState([]);
  const [historyOpen, setHistoryOpen] = useState(false);
  const [newTitle, setNewTitle] = useState("");
  const [newEffort, setNewEffort] = useState(2);
  const [newPriority, setNewPriority] = useState(5);
  const [nowMin, setNowMin] = useState(nowMinutes());

  // live clock — refresh "now" each minute so the rail stays current
  useEffect(() => {
    const t = setInterval(() => setNowMin(nowMinutes()), 60000);
    return () => clearInterval(t);
  }, []);

  // initial load from Supabase
  useEffect(() => { (async () => {
    try {
      const rows = await Store.loadAll();
      setTasks(rows.filter(r => r.kind === "task").map(readTask));
      setAppts(rows.filter(r => r.kind === "appointment").map(readAppt));
      setStatus("");
    } catch (e) {
      setStatus("Could not reach the data store: " + (e.message || e));
    } finally { setLoading(false); }
  })(); }, []);

  const sorted = useMemo(() => {
    const active = tasks.filter(t => !t.done && !t.background);
    const done = tasks.filter(t => t.done);
    const background = tasks.filter(t => t.background && !t.done);
    active.sort(SORTS[sortKey].fn);
    return { active, done, background };
  }, [tasks, sortKey]);

  const topBackground = useMemo(() => {
    const bgs = [...sorted.background].sort((a,b)=>b.priority-a.priority);
    return bgs[0] || null;
  }, [sorted.background]);

  const schedule = useMemo(() => {
    const dayStart = 7*60, dayEnd = 22*60;
    const toMin = (s) => { const [h,m]=s.split(":").map(Number); return h*60+m; };
    const blocks = appts.map(a => ({ ...a, s: toMin(a.start), e: toMin(a.end) })).sort((x,y)=>x.s-y.s);
    const gaps = []; let cursor = dayStart;
    for (const b of blocks){ if(b.s>cursor) gaps.push({s:cursor,e:b.s}); cursor=Math.max(cursor,b.e); }
    if (cursor<dayEnd) gaps.push({s:cursor,e:dayEnd});
    const gapsLeft = gaps.map(g=>({...g,used:0}));
    const placed = [];
    let queueCursor = blocks.length ? Math.max(dayStart, blocks[blocks.length-1].e) : dayStart;
    for (const t of sorted.active){
      const dur = SPOON_MIN[t.effort] || 30;
      const mayFit = t.priority >= fitLevel;
      let put = null;
      if (mayFit){
        for (const g of gapsLeft){
          const start = Math.max(g.s, g.s + g.used);
          if (start + dur <= g.e && g.e > nowMin - 1){ g.used=(start-g.s)+dur; put={start,end:start+dur}; break; }
        }
        if (!put && dur <= sizeThreshold){ put = {start: nowMin, end: nowMin+dur, loose:true}; }
      }
      if (!put){ put = {start:queueCursor, end:queueCursor+dur, queued:true}; queueCursor += dur; }
      placed.push({ ...t, dur, schStart:fmtMin(put.start), schEnd:fmtMin(put.end), startMin:put.start, loose:put.loose, queued:put.queued });
    }
    const railItems = [
      ...blocks.map(b => ({ type:"appt", startMin:b.s, endMin:b.e, ...b })),
      ...placed.map(p => ({ type:"task", ...p })),
    ].sort((x,y)=>x.startMin-y.startMin);
    return { blocks, placed, railItems };
  }, [appts, sorted.active, fitLevel, sizeThreshold, nowMin]);

  const totalForeground = useMemo(() => sorted.active.reduce((s,t)=>s+(SPOON_MIN[t.effort]||30),0), [sorted.active]);

  const dayHistory = useMemo(() => {
    const elapsedAppts = schedule.blocks.filter(b => b.e <= nowMin);
    const combined = [
      ...sorted.done.map(t => ({ key:`t-${t.id}`, kind:"task", id:t.id, title:t.title })),
      ...elapsedAppts.map(b => ({ key:`a-${b.id}`, kind:"appt", title:b.title, start:b.start, end:b.end })),
    ];
    return { elapsedAppts, combined };
  }, [schedule.blocks, sorted.done, nowMin]);

  // ---- actions (persist to Supabase, then update local state) ----
  const addTask = useCallback(async () => {
    const title = newTitle.trim(); if (!title) return;
    const dataObj = { title, project:"—", priority:newPriority, effort:newEffort, done:false };
    setStatus("Saving…");
    try {
      const row = await Store.add("task", dataObj);
      setTasks(prev => [...prev, readTask(row)]);
      setNewTitle(""); setNewEffort(2); setNewPriority(5); setStatus("");
    } catch (e) { setStatus("Save failed: " + (e.message||e)); }
  }, [newTitle, newEffort, newPriority]);

  const toggleDone = useCallback(async (id) => {
    const t = tasks.find(x => x.id === id); if (!t) return;
    const next = { title:t.title, project:t.project, priority:t.priority, effort:t.effort, note:t.note, background:t.background, done: !t.done };
    setTasks(prev => prev.map(x => x.id===id ? {...x, done: !x.done} : x)); // optimistic
    try { await Store.update(id, next); } catch (e) { setStatus("Update failed: " + (e.message||e)); }
  }, [tasks]);

  if (loading) {
    return <div style={{maxWidth:1180, margin:"0 auto", padding:"40px 24px", color:C.sub}}>Loading your day…</div>;
  }

  const Eyebrow = ({children,n}) => (
    <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:14}}>
      <span style={{fontFamily:"Georgia, serif",fontSize:12,letterSpacing:2,textTransform:"uppercase",color:C.faint}}>{n}</span>
      <h2 style={{margin:0,fontFamily:"Georgia, serif",fontSize:19,fontWeight:600,color:C.ink,letterSpacing:0.2}}>{children}</h2>
    </div>
  );

  const Foreground = () => {
    const items = schedule.railItems.filter(it => it.endMin > nowMin);
    return (
      <section>
        <div style={{border:`1px solid ${C.line}`,borderRadius:4,padding:"12px 12px 12px 14px",background:"rgba(255,255,255,0.4)"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <span style={{fontSize:10.5,fontWeight:700,letterSpacing:1,color:C.nowline,fontVariantNumeric:"tabular-nums"}}>NOW · {fmtMin(nowMin)}</span>
            <span style={{flex:1,height:2,background:C.nowline,opacity:0.5}} />
          </div>
          {items.length === 0 && <div style={{fontSize:13,color:C.faint,fontStyle:"italic",padding:"8px 0"}}>Nothing scheduled ahead. Capture something below.</div>}
          {items.map((it,i) => (
            <React.Fragment key={it.id || `${it.type}-${i}`}>
              {it.type === "appt" ? (
                <div style={{background:C.fixed,color:"#dfe3ea",borderRadius:3,padding:"10px 12px",marginBottom:10,
                  outline:(nowMin>=it.startMin&&nowMin<it.endMin)?`2px solid ${C.amber}`:"none"}}>
                  <div style={{fontSize:10.5,letterSpacing:1,textTransform:"uppercase",opacity:0.7,marginBottom:2}}>
                    {(nowMin>=it.startMin&&nowMin<it.endMin)?"Now · in progress":"Fixed"} · {it.start}–{it.end}
                  </div>
                  <div style={{fontSize:14,fontWeight:600}}>{it.title}</div>
                </div>
              ) : (
                <div style={{border:`1px solid ${C.panelEdge}`,borderLeft:`3px solid ${priorityTone(it.priority)}`,
                  background:C.panel,borderRadius:3,padding:"10px 12px",marginBottom:8,display:"flex",gap:10,alignItems:"flex-start"}}>
                  <button onClick={()=>toggleDone(it.id)} aria-label="mark done"
                    style={{marginTop:2,width:16,height:16,flexShrink:0,border:`1.5px solid ${C.faint}`,borderRadius:3,background:"transparent",cursor:"pointer"}} />
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,color:C.ink,fontWeight:500,lineHeight:1.3}}>{it.title}</div>
                    <div style={{display:"flex",gap:10,marginTop:4,flexWrap:"wrap",alignItems:"center"}}>
                      <span style={{fontSize:11,color:it.loose?C.amber:C.faint,fontVariantNumeric:"tabular-nums"}}>
                        {it.schStart}–{it.schEnd}{it.loose?" · slipped in":it.queued?" · queued":""}
                      </span>
                      <span style={{fontSize:11,color:C.sub}}>· {it.project}</span>
                      <span style={{display:"inline-flex",gap:3}}>
                        {Array.from({length:5}).map((_,k)=>(
                          <span key={k} style={{width:5,height:5,borderRadius:5,background:k<it.effort?priorityTone(it.priority):C.line}} />
                        ))}
                      </span>
                    </div>
                    {it.note && <div style={{fontSize:11.5,color:C.faint,marginTop:5,fontStyle:"italic"}}>{it.note}</div>}
                  </div>
                </div>
              )}
            </React.Fragment>
          ))}
        </div>

        {topBackground && (
          <div style={{marginTop:10,border:`1px dashed ${C.cold}`,background:"rgba(91,111,140,0.06)",borderRadius:3,padding:"9px 12px",display:"flex",gap:10,alignItems:"center"}}>
            <span style={{fontSize:9.5,letterSpacing:1,textTransform:"uppercase",color:C.cold,fontWeight:700}}>If a gap opens</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,color:C.ink,fontWeight:500}}>{topBackground.title}</div>
              <div style={{fontSize:10.5,color:C.cold}}>default interstitial work · not a foreground task</div>
            </div>
          </div>
        )}

        <div style={{display:"flex",flexWrap:"wrap",gap:6,margin:"16px 0 0"}}>
          {Object.entries(SORTS).map(([k,s])=>{
            const on = k===sortKey;
            return (
              <button key={k} onClick={()=>setSortKey(k)} style={{border:`1px solid ${on?C.amber:C.panelEdge}`,background:on?C.amberSoft:"transparent",color:on?C.ink:C.sub,borderRadius:2,padding:"6px 10px",cursor:"pointer",textAlign:"left",lineHeight:1.15}}>
                <div style={{fontSize:13,fontWeight:600}}>{s.label}</div>
                <div style={{fontSize:10.5,color:C.faint}}>{s.sub}</div>
              </button>
            );
          })}
          <div style={{marginLeft:"auto",alignSelf:"center",fontSize:11.5,color:C.faint}}>
            {sorted.active.length} open · {minToLabel(totalForeground)} of focus
          </div>
        </div>

        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8,alignItems:"center"}}>
          <span style={{fontSize:10.5,letterSpacing:1,textTransform:"uppercase",color:C.faint,marginRight:2}}>Fit</span>
          {FIT_LEVELS.map(f=>{
            const on = f.v===fitLevel;
            return <button key={f.v} onClick={()=>setFitLevel(f.v)} title={f.sub} style={{border:`1px solid ${on?C.cold:C.panelEdge}`,background:on?"rgba(91,111,140,0.1)":"transparent",color:on?C.ink:C.sub,borderRadius:2,padding:"5px 9px",cursor:"pointer",fontSize:12,fontWeight:on?600:400}}>{f.label}</button>;
          })}
          <span style={{fontSize:10.5,color:C.faint,marginLeft:4}}>{FIT_LEVELS.find(f=>f.v===fitLevel)?.sub}</span>
        </div>

        <div style={{marginTop:18,paddingTop:16,borderTop:`1px solid ${C.line}`}}>
          <input value={newTitle} onChange={e=>setNewTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTask()}
            placeholder="Capture a task — just the title is enough"
            style={{width:"100%",boxSizing:"border-box",border:`1px solid ${C.panelEdge}`,borderRadius:3,padding:"10px 12px",fontSize:14,color:C.ink,background:C.panel,fontFamily:"inherit"}} />
          <div style={{display:"flex",gap:16,marginTop:10,alignItems:"center",flexWrap:"wrap"}}>
            <label style={{fontSize:12,color:C.sub,display:"inline-flex",alignItems:"center"}}>effort
              <span style={{display:"inline-flex",gap:3,marginLeft:8}}>
                {[1,2,3,4,5].map(n=>(
                  <button key={n} onClick={()=>setNewEffort(n)} aria-label={`effort ${n}`} style={{width:16,height:16,borderRadius:8,cursor:"pointer",border:"none",background:n<=newEffort?C.amber:C.line}} />
                ))}
              </span>
              <span style={{marginLeft:8,fontSize:11,color:C.faint}}>≈{minToLabel(SPOON_MIN[newEffort])}</span>
            </label>
            <label style={{fontSize:12,color:C.sub,display:"inline-flex",alignItems:"center"}}>priority
              <input type="range" min="0" max="10" value={newPriority} onChange={e=>setNewPriority(Number(e.target.value))} style={{marginLeft:8,verticalAlign:"middle",accentColor:C.amber}} />
              <span style={{marginLeft:8,fontSize:11,color:C.faint,fontVariantNumeric:"tabular-nums"}}>{newPriority}</span>
            </label>
            <button onClick={addTask} style={{marginLeft:"auto",background:C.ink,color:C.paper,border:"none",borderRadius:3,padding:"9px 16px",fontSize:13,cursor:"pointer",fontWeight:600}}>Capture</button>
          </div>
        </div>

        {dayHistory.combined.length > 0 && (
          <div style={{marginTop:22,paddingTop:14,borderTop:`1px dashed ${C.panelEdge}`}}>
            <button onClick={()=>setHistoryOpen(v=>!v)} style={{display:"flex",alignItems:"center",gap:8,width:"100%",background:"none",border:"none",cursor:"pointer",padding:0,textAlign:"left"}}>
              <span style={{fontSize:9,color:C.good,transform:historyOpen?"rotate(90deg)":"none",display:"inline-block"}}>▶</span>
              <span style={{fontSize:11,letterSpacing:1,textTransform:"uppercase",color:C.good}}>Today, so far</span>
              <span style={{fontSize:11,color:"#fff",background:C.good,borderRadius:9,padding:"1px 7px",fontWeight:600}}>{dayHistory.combined.length}</span>
              {!historyOpen && dayHistory.combined[0] && (
                <span style={{fontSize:12,color:C.faint,marginLeft:4,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>· {dayHistory.combined[0].title}</span>
              )}
            </button>
            {historyOpen && (
              <div style={{marginTop:10}}>
                {dayHistory.combined.map(h=>(
                  <div key={h.key} style={{display:"flex",gap:10,alignItems:"center",marginBottom:6}}>
                    {h.kind==="task"
                      ? <span style={{width:16,height:16,borderRadius:3,background:C.good,color:"#fff",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:11,flexShrink:0}}>✓</span>
                      : <span style={{width:16,height:16,borderRadius:3,background:C.fixed,color:"#fff",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:9,flexShrink:0}}>▦</span>}
                    <span style={{fontSize:13,color:C.faint,textDecoration:h.kind==="task"?"line-through":"none"}}>{h.title}</span>
                    {h.kind==="appt" && <span style={{fontSize:10.5,color:C.faint}}>· {h.start}–{h.end}</span>}
                    {h.kind==="task" && <button onClick={()=>toggleDone(h.id)} style={{marginLeft:"auto",fontSize:11,color:C.faint,background:"none",border:"none",cursor:"pointer"}}>undo</button>}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </section>
    );
  };

  const Background = () => (
    <section>
      <Eyebrow n="II">Background</Eyebrow>
      <p style={leadStyle}>What the scout is ranging on. Set, not nagged — and the same thing as interstitial work.</p>
      {sorted.background.length === 0 && <div style={{fontSize:12.5,color:C.faint,fontStyle:"italic"}}>No background work set. (Capture a task and mark it background.)</div>}
      {sorted.background.map(b=>(
        <div key={b.id} style={{border:`1px solid ${C.panelEdge}`,borderRadius:3,padding:"12px 14px",marginBottom:10,background:C.panel}}>
          <div style={{fontSize:14,fontWeight:500,color:C.ink,lineHeight:1.35}}>{b.title}</div>
          {b.note && <div style={{fontSize:12,color:C.faint,marginTop:6,lineHeight:1.45}}>{b.note}</div>}
        </div>
      ))}
    </section>
  );

  const Relaxation = () => (
    <section>
      <Eyebrow n="III">Relaxation</Eyebrow>
      <p style={leadStyle}>Restoration, curated to mode and guarded against the pull-you-deeper default.</p>
      <div style={{fontSize:12.5,color:C.faint,fontStyle:"italic"}}>The curation surface lands here. (Stocking the gap-restoration set is its own task.)</div>
    </section>
  );

  return (
    <div style={{minHeight:"100vh"}}>
      <header style={{maxWidth:1180,margin:"0 auto",padding:"max(28px, env(safe-area-inset-top)) 24px 10px"}}>
        <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <h1 style={{margin:0,fontFamily:"Georgia, serif",fontSize:26,fontWeight:600,letterSpacing:-0.2}}>My Intentional Life</h1>
          <div style={{fontSize:12.5,color:C.sub,fontStyle:"italic"}}>the urgent that is always done, and the important that is finally heard</div>
        </div>
        <div id="status-bar" style={{color: status.startsWith("Could not")||status.includes("failed") ? "#a23" : C.faint}}>{status}</div>
        <div style={{height:1,background:C.panelEdge}} />
      </header>

      <div className="il-tabs" style={{maxWidth:1180,margin:"0 auto",padding:"10px 24px 0",gap:6}}>
        {[["foreground","Foreground"],["background","Background"],["relaxation","Relaxation"]].map(([k,label])=>(
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,border:`1px solid ${tab===k?C.amber:C.panelEdge}`,background:tab===k?C.amberSoft:"transparent",color:tab===k?C.ink:C.sub,borderRadius:2,padding:"9px 6px",fontSize:13,fontWeight:600,cursor:"pointer"}}>{label}</button>
        ))}
      </div>

      <main style={{maxWidth:1180,margin:"0 auto",padding:"18px 24px calc(60px + env(safe-area-inset-bottom))"}}>
        <div className="il-cols">
          <section className={tab==="foreground"?"il-active":""}>{Foreground()}</section>
          <section className={tab==="background"?"il-active":""}>{Background()}</section>
          <section className={tab==="relaxation"?"il-active":""}>{Relaxation()}</section>
        </div>
      </main>
    </div>
  );
}

const leadStyle = { margin:"0 0 16px", fontSize:12.5, color:C.sub, lineHeight:1.5, maxWidth:"42ch" };

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
