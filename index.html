<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f3f1ec" />
<title>My Intentional Life</title>
<link rel="manifest" href="manifest.json" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background:#f3f1ec; color:#1c1f26; font-family: system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; -webkit-text-size-adjust:100%; }
  @media (prefers-reduced-motion: reduce) { * { transition:none !important; } }
  button:focus-visible, input:focus-visible { outline:2px solid #c8741a; outline-offset:2px; }
  ::-webkit-scrollbar { width:8px; } ::-webkit-scrollbar-thumb { background:#d8d3c8; border-radius:4px; }
  .il-cols { display:grid; grid-template-columns:1.35fr 1fr 1fr; gap:18px; }
  .il-tabs { display:none; }
  @media (max-width:860px) {
    .il-cols { display:block; }
    .il-cols > section { display:none; }
    .il-cols > section.il-active { display:block; }
    .il-tabs { display:flex; }
  }
  #status-bar { font-size:12px; padding:4px 0; min-height:20px; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
"use strict";
// ============================================================
//  CONFIG
// ============================================================
var SUPABASE_URL = "https://vjkuksmwycnklkfpngtq.supabase.co";
var SUPABASE_KEY = "sb_publishable_2gnanut8Zvt6cyt8BBCUfw_e4ZU81YA";
var db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================================
//  Data layer — schema-light against the `items` table, tolerant reads.
// ============================================================
var Store = {
  loadAll: function () {
    return db.from("items").select("*").then(function (r) {
      if (r.error) throw r.error; return r.data || [];
    });
  },
  add: function (kind, dataObj) {
    return db.from("items").insert([{ kind: kind, data: dataObj }]).select().then(function (r) {
      if (r.error) throw r.error; return r.data[0];
    });
  },
  update: function (id, dataObj) {
    return db.from("items").update({ data: dataObj }).eq("id", id).select().then(function (r) {
      if (r.error) throw r.error; return r.data[0];
    });
  }
};
function readTask(row) {
  var d = row.data || {};
  return {
    id: row.id,
    title: d.title || "(untitled)",
    project: d.project || "—",
    priority: typeof d.priority === "number" ? d.priority : 5,
    effort: clampEffort(typeof d.effort === "number" ? d.effort : 2),
    note: d.note || "",
    done: !!d.done,
    background: !!d.background,
    updated_at: row.updated_at
  };
}
function readAppt(row) {
  var d = row.data || {};
  return { id: row.id, title: d.title || "(appointment)", start: d.start || "09:00", end: d.end || "10:00" };
}

// ============================================================
//  App — plain React (no JSX, no Babel). h = createElement.
// ============================================================
var h = React.createElement;
var useState = React.useState, useMemo = React.useMemo, useCallback = React.useCallback, useEffect = React.useEffect, Fragment = React.Fragment;

var C = {
  ink:"#1c1f26", paper:"#f3f1ec", panel:"#ffffff", panelEdge:"#e2ded4",
  sub:"#6b6f78", faint:"#9b9ea6", rail:"#d8d3c8",
  fixed:"#3a4250", amber:"#c8741a", amberSoft:"#f0e2cf",
  cold:"#5b6f8c", line:"#eae6dd", good:"#5d7052", nowline:"#c8741a"
};
// effort: 1-3 spoons. 3 = "60+" and a stop-and-decompose signal (the old 4/5 top is gone).
var SPOON_MIN = { 1:15, 2:30, 3:60 };
var MAX_SPOON = 3;
function clampEffort(n){ n = (typeof n==="number") ? n : 2; if(n<1) return 1; if(n>MAX_SPOON) return MAX_SPOON; return Math.round(n); }
// priority as color swatches. stored values spaced for forward-compat; highest=red.
// reserved (not yet surfaced): white=0, dark-blue=2, evens 4/6/8.
var PRIORITY = [
  { v:9, key:"red",    color:"#e02a1f", label:"Red" },
  { v:7, key:"orange", color:"#f57b13", label:"Orange" },
  { v:5, key:"yellow", color:"#f4c20d", label:"Yellow" },
  { v:3, key:"beige",  color:"#cdab7e", label:"Beige" },
  { v:1, key:"blue",   color:"#5aa9e6", label:"Light blue" }
];
function prioritySwatch(p){
  var best = PRIORITY[PRIORITY.length-1];
  for (var i=0;i<PRIORITY.length;i++){ if(p>=PRIORITY[i].v){ best=PRIORITY[i]; break; } }
  return best;
}
var SORTS = {
  default:   { label:"Default",        sub:"priority, then heaviest", fn:function(a,b){ return b.priority-a.priority || b.effort-a.effort; } },
  light:     { label:"Quick first",    sub:"lightest, then priority", fn:function(a,b){ return a.effort-b.effort || b.priority-a.priority; } },
  prioLight: { label:"Priority · light", sub:"priority, then lightest", fn:function(a,b){ return b.priority-a.priority || a.effort-b.effort; } }
};
function fmtMin(mm){ return String(Math.floor(mm/60)%24).padStart(2,"0")+":"+String(mm%60).padStart(2,"0"); }
function minToLabel(min){ if(min<60) return min+"m"; var hh=Math.floor(min/60), m=min%60; return m? hh+"h"+m : hh+"h"; }
function priorityTone(p){ return prioritySwatch(p).color; }
function nowMinutes(){ var d=new Date(); return d.getHours()*60 + d.getMinutes(); }

// Self-contained inline title editor. Owns its own draft. Commits on Enter and on blur,
// cancels on Escape, and — critically — commits on UNMOUNT for any reason (re-sort, tab
// switch, timer re-render dropping the card). onCommit(value) and onCancel() are guarded
// upstream against empty/unchanged, so a redundant call is a harmless no-op.
function EditField(props){
  var s = useState(props.initial || ""), val = s[0], setVal = s[1];
  var ref = React.useRef(val); ref.current = val;
  var committed = React.useRef(false);
  function commit(){ if(committed.current) return; committed.current = true; props.onCommit(ref.current); }
  useEffect(function(){
    return function(){ commit(); }; // fires on unmount, however the unmount was caused
  }, []);
  return h("input",{autoFocus:true,value:val,
    onChange:function(e){ setVal(e.target.value); },
    onKeyDown:function(e){
      if(e.key==="Enter"){ e.preventDefault(); commit(); }
      else if(e.key==="Escape"){ committed.current = true; props.onCancel(); }
    },
    onBlur:function(){ commit(); },
    style:props.style});
}

function App() {
  var s_loading = useState(true), loading = s_loading[0], setLoading = s_loading[1];
  var s_status = useState(""), status = s_status[0], setStatus = s_status[1];
  var s_tab = useState("foreground"), tab = s_tab[0], setTab = s_tab[1];
  var s_sort = useState("default"), sortKey = s_sort[0], setSortKey = s_sort[1];
  var s_tasks = useState([]), tasks = s_tasks[0], setTasks = s_tasks[1];
  var s_appts = useState([]), appts = s_appts[0], setAppts = s_appts[1];
  var s_hist = useState(false), historyOpen = s_hist[0], setHistoryOpen = s_hist[1];
  var s_title = useState(""), newTitle = s_title[0], setNewTitle = s_title[1];
  var s_eff = useState(2), newEffort = s_eff[0], setNewEffort = s_eff[1];
  var s_pri = useState(5), newPriority = s_pri[0], setNewPriority = s_pri[1];
  var s_now = useState(nowMinutes()), nowMin = s_now[0], setNowMin = s_now[1];
  // v0.2 contextual popup: which task and where on screen. (editId tracks inline editing.)
  var s_pop = useState(null), popup = s_pop[0], setPopup = s_pop[1]; // {id,x,y} or null
  var s_edit = useState(null), editId = s_edit[0], setEditId = s_edit[1]; // task id being text-edited, or null

  useEffect(function(){
    var t = setInterval(function(){ setNowMin(nowMinutes()); }, 60000);
    return function(){ clearInterval(t); };
  }, []);

  useEffect(function(){
    Store.loadAll().then(function(rows){
      setTasks(rows.filter(function(r){return r.kind==="task";}).map(readTask));
      setAppts(rows.filter(function(r){return r.kind==="appointment";}).map(readAppt));
      setStatus("");
    }).catch(function(e){
      setStatus("Could not reach the data store: " + (e.message||e));
    }).then(function(){ setLoading(false); });
  }, []);

  var sorted = useMemo(function(){
    var active = tasks.filter(function(t){return !t.done && !t.background;});
    var done = tasks.filter(function(t){return t.done;});
    var background = tasks.filter(function(t){return t.background && !t.done;});
    active.sort(SORTS[sortKey].fn);
    return { active:active, done:done, background:background };
  }, [tasks, sortKey]);

  var topBackground = useMemo(function(){
    var bgs = sorted.background.slice().sort(function(a,b){return b.priority-a.priority;});
    return bgs[0] || null;
  }, [sorted.background]);

  // COMPOSE: tasks (sorted, no times) + events (fixed times) → rail.
  // Re-runs on sort change / add / delete / edit (via sorted.active) and on appts / nowMin.
  // Forward-only cursor, strict sort order, roll-forward, NO backfill. Gaps are acceptable.
  // A task's shown time is the real slot it landed in — never an invented stamp.
  var schedule = useMemo(function(){
    var horizon = nowMin + 48*60; // 48h ahead; revisit when calendar events bring real dates
    function toMin(s){ var p=s.split(":"); return (+p[0])*60 + (+p[1]); }
    // events: fixed blocks, sorted by start, only those not already past
    var blocks = appts.map(function(a){ return Object.assign({}, a, { s:toMin(a.start), e:toMin(a.end) }); })
      .filter(function(b){ return b.e > nowMin; })
      .sort(function(x,y){ return x.s-y.s; });
    // slots: the open time between now→first event, event→event, last event→horizon
    var slots=[], cursor=nowMin, i;
    for (i=0;i<blocks.length;i++){
      if (blocks[i].s > cursor){ slots.push({ s:cursor, e:blocks[i].s, after:i }); } // gap before block i
      cursor = Math.max(cursor, blocks[i].e);
    }
    if (cursor < horizon){ slots.push({ s:cursor, e:horizon, after:blocks.length }); } // tail slot
    // walk sorted tasks with a forward-only cursor; place each in the earliest slot AT OR AFTER
    // the cursor that holds its duration. Skipped slots are left empty (no backfill).
    var slotState = slots.map(function(g){ return { s:g.s, e:g.e, after:g.after, used:0, tasks:[] }; });
    var sIdx = 0;            // forward-only slot cursor
    var unfitted = [];       // tasks that fit no remaining slot → render below last event
    var overflowing = false; // once true, every later task joins unfitted (strict order)
    sorted.active.forEach(function(t){
      var dur = SPOON_MIN[t.effort] || 30; // effort 3 ("60+") counts as 60 for fit math
      if (overflowing){ unfitted.push(Object.assign({}, t, { dur:dur })); return; }
      var placedHere = false;
      while (sIdx < slotState.length){
        var g = slotState[sIdx];
        var start = g.s + g.used;
        if (start + dur <= g.e){
          g.tasks.push(Object.assign({}, t, { dur:dur, startMin:start, endMin:start+dur,
            schStart:fmtMin(start), schEnd:fmtMin(start+dur) }));
          g.used += dur;
          placedHere = true;
          break;
        } else {
          sIdx++; // this slot can't hold it — roll forward, leave remaining space empty
        }
      }
      if (!placedHere){ overflowing = true; unfitted.push(Object.assign({}, t, { dur:dur })); }
    });
    // build the rail in true visual order: interleave events and their preceding slot's tasks,
    // then the tail slot's tasks, then unfitted below everything.
    var railItems = [];
    function pushSlotTasks(afterIndex){
      slotState.forEach(function(g){
        if (g.after === afterIndex){ g.tasks.forEach(function(p){ railItems.push(Object.assign({ type:"task" }, p)); }); }
      });
    }
    for (i=0;i<blocks.length;i++){
      pushSlotTasks(i);                 // tasks in the slot before event i
      railItems.push(Object.assign({ type:"appt", startMin:blocks[i].s, endMin:blocks[i].e }, blocks[i]));
    }
    pushSlotTasks(blocks.length);       // tasks in the tail slot (after last event)
    unfitted.forEach(function(p){ railItems.push(Object.assign({ type:"task", unfitted:true }, p)); });
    return { blocks:blocks, railItems:railItems, unfittedCount:unfitted.length };
  }, [appts, sorted.active, nowMin]);

  var totalForeground = useMemo(function(){
    return sorted.active.reduce(function(s,t){ return s+(SPOON_MIN[t.effort]||30); }, 0);
  }, [sorted.active]);

  var dayHistory = useMemo(function(){
    var elapsedAppts = schedule.blocks.filter(function(b){ return b.e <= nowMin; });
    var combined = sorted.done.map(function(t){ return {key:"t-"+t.id, kind:"task", id:t.id, title:t.title}; })
      .concat(elapsedAppts.map(function(b){ return {key:"a-"+b.id, kind:"appt", title:b.title, start:b.start, end:b.end}; }));
    return { elapsedAppts:elapsedAppts, combined:combined };
  }, [schedule.blocks, sorted.done, nowMin]);

  var addTask = useCallback(function(){
    var title = newTitle.trim(); if(!title) return;
    var dataObj = { title:title, project:"—", priority:newPriority, effort:clampEffort(newEffort), done:false };
    setStatus("Saving…");
    Store.add("task", dataObj).then(function(row){
      setTasks(function(prev){ return prev.concat([readTask(row)]); });
      setNewTitle(""); setNewEffort(2); setNewPriority(5); setStatus("");
    }).catch(function(e){ setStatus("Save failed: " + (e.message||e)); });
  }, [newTitle, newEffort, newPriority]);

  // Merge-and-persist: take the current task, apply a patch, write the full data object back.
  // Centralizes writes so no path (done/title/priority) silently drops another's fields.
  var persist = useCallback(function(id, patch){
    setTasks(function(prev){
      var next = prev.map(function(x){ return x.id===id ? Object.assign({}, x, patch) : x; });
      var t = next.filter(function(x){return x.id===id;})[0];
      if (t){
        var dataObj = { title:t.title, project:t.project, priority:t.priority, effort:clampEffort(t.effort), note:t.note, background:t.background, done:t.done };
        Store.update(id, dataObj).catch(function(e){ setStatus("Update failed: " + (e.message||e)); });
      }
      return next;
    });
  }, []);

  var toggleDone = useCallback(function(id){
    setPopup(null); setEditId(null);
    var t = tasks.filter(function(x){return x.id===id;})[0]; if(!t) return;
    persist(id, { done: !t.done });
  }, [tasks, persist]);

  // value comes from the field itself (it owns its draft); guard empty + unchanged here too.
  var saveTitle = useCallback(function(id, value){
    var t = (value||"").trim();
    setTasks(function(prev){
      var cur = prev.filter(function(x){return x.id===id;})[0];
      if (t && cur && t !== cur.title){
        var dataObj = { title:t, project:cur.project, priority:cur.priority, effort:clampEffort(cur.effort), note:cur.note, background:cur.background, done:cur.done };
        Store.update(id, dataObj).catch(function(e){ setStatus("Update failed: " + (e.message||e)); });
        return prev.map(function(x){ return x.id===id ? Object.assign({}, x, { title:t }) : x; });
      }
      return prev;
    });
    setEditId(null);
  }, []);

  var setPriorityFor = useCallback(function(id, v){
    persist(id, { priority:v });
  }, [persist]);

  var openEdit = useCallback(function(id){
    setEditId(id);
    setPopup(null); // Option 1: Edit launches the inline card field; the popup's job is done.
  }, []);

  var closePopup = useCallback(function(){ setPopup(null); setEditId(null); }, []);

  // Pointer-events long-press (no 300ms synthetic-click ghost) + right-click on desktop.
  var pressTimer = React.useRef(null);
  var pressOrigin = React.useRef(null);  // {x,y,pointerId} of the in-flight press
  var openGuardUntil = React.useRef(0);  // backdrop ignores closes until this timestamp
  var MOVE_SLOP = 10;                     // px of finger drift tolerated before it's a scroll

  function clearPress(){
    if(pressTimer.current){ clearTimeout(pressTimer.current); pressTimer.current=null; }
    pressOrigin.current = null;
  }
  function pressHandlers(task){
    function openAt(clientX, clientY){
      openGuardUntil.current = Date.now() + 120; // swallow the tail of this same gesture
      setPopup({ id:task.id, x:clientX, y:clientY });
      setEditId(null);
    }
    return {
      onPointerDown:function(e){
        // primary button / touch / pen only; ignore right-button (that's contextmenu's job)
        if(e.button && e.button!==0) return;
        var x=e.clientX, y=e.clientY, pid=e.pointerId;
        pressOrigin.current = { x:x, y:y, pointerId:pid };
        clearTimeout(pressTimer.current);
        pressTimer.current = setTimeout(function(){
          pressTimer.current = null;
          openAt(x, y);
        }, 480);
      },
      onPointerMove:function(e){
        var o = pressOrigin.current; if(!o) return;
        if(Math.abs(e.clientX-o.x) > MOVE_SLOP || Math.abs(e.clientY-o.y) > MOVE_SLOP){ clearPress(); }
      },
      onPointerUp:clearPress,
      onPointerCancel:clearPress,
      onContextMenu:function(e){ e.preventDefault(); openAt(e.clientX, e.clientY); }
    };
  }

  if (loading) {
    return h("div", { style:{maxWidth:1180, margin:"0 auto", padding:"40px 24px", color:C.sub} }, "Loading your day…");
  }

  function eyebrow(n, txt){
    return h("div", { style:{display:"flex",alignItems:"baseline",gap:10,marginBottom:14} },
      h("span", { style:{fontFamily:"Georgia, serif",fontSize:12,letterSpacing:2,textTransform:"uppercase",color:C.faint} }, n),
      h("h2", { style:{margin:0,fontFamily:"Georgia, serif",fontSize:19,fontWeight:600,color:C.ink,letterSpacing:0.2} }, txt)
    );
  }

  function spoonDots(effort, tone){
    var dots=[]; for(var k=0;k<MAX_SPOON;k++){ dots.push(h("span",{key:k,style:{width:5,height:5,borderRadius:5,background:k<effort?tone:C.line}})); }
    return h("span",{style:{display:"inline-flex",gap:3}}, dots);
  }

  // A row of priority swatches. selectedV = currently chosen stored value; onPick(v) commits.
  function swatchRow(selectedV, onPick, size){
    size = size || 22;
    return h("span",{style:{display:"inline-flex",gap:6}},
      PRIORITY.map(function(p){
        var on = p.v===selectedV;
        return h("button",{key:p.key,onClick:function(e){ e.stopPropagation(); onPick(p.v); },title:p.label,"aria-label":"priority "+p.label,
          style:{width:size,height:size,borderRadius:4,cursor:"pointer",background:p.color,
            border:on?"2px solid "+C.ink:"2px solid transparent",
            boxShadow:on?"0 0 0 1px #fff inset":"none",
            transform:on?"scale(1.08)":"none",transition:"transform .08s"}});
      })
    );
  }

  function foreground(){
    // keep unfitted tasks (no real time) always; drop fitted items / events only once elapsed
    var items = schedule.railItems.filter(function(it){ return it.unfitted || it.endMin > nowMin; });
    var railChildren = [
      h("div",{key:"nowbar",style:{display:"flex",alignItems:"center",gap:8,marginBottom:12}},
        h("span",{style:{fontSize:10.5,fontWeight:700,letterSpacing:1,color:C.nowline,fontVariantNumeric:"tabular-nums"}}, "NOW · "+fmtMin(nowMin)),
        h("span",{style:{flex:1,height:2,background:C.nowline,opacity:0.5}})
      )
    ];
    if (items.length===0){
      railChildren.push(h("div",{key:"empty",style:{fontSize:13,color:C.faint,fontStyle:"italic",padding:"8px 0"}}, "Nothing scheduled ahead. Capture something below."));
    }
    var unfittedShown = false;
    items.forEach(function(it,i){
      if (it.type==="task" && it.unfitted && !unfittedShown){
        unfittedShown = true;
        railChildren.push(
          h("div",{key:"unfit-div",style:{display:"flex",alignItems:"center",gap:8,margin:"14px 0 10px"}},
            h("span",{style:{fontSize:10,letterSpacing:1,textTransform:"uppercase",color:C.cold,fontWeight:700}}, "Doesn't fit before the horizon"),
            h("span",{style:{flex:1,height:1,background:C.panelEdge}})
          )
        );
      }
      if (it.type==="appt"){
        var active = (nowMin>=it.startMin && nowMin<it.endMin);
        railChildren.push(
          h("div",{key:it.id||("a"+i),style:{background:C.fixed,color:"#dfe3ea",borderRadius:3,padding:"10px 12px",marginBottom:10,outline:active?("2px solid "+C.amber):"none"}},
            h("div",{style:{fontSize:10.5,letterSpacing:1,textTransform:"uppercase",opacity:0.7,marginBottom:2}}, (active?"Now · in progress":"Fixed")+" · "+it.start+"–"+it.end),
            h("div",{style:{fontSize:14,fontWeight:600}}, it.title)
          )
        );
      } else {
        var sw = prioritySwatch(it.priority);
        var ph = pressHandlers(it);
        var titleNode = (editId===it.id)
          ? h(EditField,{ initial: it.title,
              onCommit:function(v){ saveTitle(it.id, v); },
              onCancel:function(){ setEditId(null); },
              style:{width:"100%",boxSizing:"border-box",border:"1px solid "+sw.color,borderRadius:3,padding:"4px 7px",fontSize:14,color:C.ink,fontFamily:"inherit",fontWeight:500} })
          : h("div",{style:{fontSize:14,color:C.ink,fontWeight:500,lineHeight:1.3,cursor:"default"}}, it.title);
        railChildren.push(
          h("div",Object.assign({key:it.id||("t"+i),style:{border:"1px solid "+C.panelEdge,borderLeft:"5px solid "+sw.color,background:C.panel,borderRadius:3,padding:"10px 12px",marginBottom:8,display:"flex",gap:10,alignItems:"flex-start",WebkitUserSelect:"none",userSelect:"none",touchAction:"pan-y"}},ph),
            h("button",{onClick:function(){toggleDone(it.id);},"aria-label":"mark done",style:{marginTop:2,width:16,height:16,flexShrink:0,border:"1.5px solid "+C.faint,borderRadius:3,background:"transparent",cursor:"pointer"}}),
            h("div",{style:{flex:1,minWidth:0}},
              titleNode,
              h("div",{style:{display:"flex",gap:10,marginTop:4,flexWrap:"wrap",alignItems:"center"}},
                h("span",{style:{fontSize:11,color:it.unfitted?C.cold:C.faint,fontVariantNumeric:"tabular-nums"}},
                  it.unfitted ? "doesn't fit ahead" : (it.schStart+"–"+it.schEnd)),
                h("span",{style:{fontSize:11,color:C.sub}}, "· "+it.project),
                spoonDots(it.effort, sw.color)
              ),
              it.note ? h("div",{style:{fontSize:11.5,color:C.faint,marginTop:5,fontStyle:"italic"}}, it.note) : null
            )
          )
        );
      }
    });

    var children = [ h("div",{key:"rail",style:{border:"1px solid "+C.line,borderRadius:4,padding:"12px 12px 12px 14px",background:"rgba(255,255,255,0.4)"}}, railChildren) ];

    if (topBackground){
      children.push(
        h("div",{key:"bgfoot",style:{marginTop:10,border:"1px dashed "+C.cold,background:"rgba(91,111,140,0.06)",borderRadius:3,padding:"9px 12px",display:"flex",gap:10,alignItems:"center"}},
          h("span",{style:{fontSize:9.5,letterSpacing:1,textTransform:"uppercase",color:C.cold,fontWeight:700}}, "If a gap opens"),
          h("div",{style:{flex:1}},
            h("div",{style:{fontSize:13,color:C.ink,fontWeight:500}}, topBackground.title),
            h("div",{style:{fontSize:10.5,color:C.cold}}, "default interstitial work · not a foreground task")
          )
        )
      );
    }

    var sortBtns = Object.keys(SORTS).map(function(k){
      var on = k===sortKey, sdef = SORTS[k];
      return h("button",{key:k,onClick:function(){setSortKey(k);},style:{border:"1px solid "+(on?C.amber:C.panelEdge),background:on?C.amberSoft:"transparent",color:on?C.ink:C.sub,borderRadius:2,padding:"6px 10px",cursor:"pointer",textAlign:"left",lineHeight:1.15}},
        h("div",{style:{fontSize:13,fontWeight:600}}, sdef.label),
        h("div",{style:{fontSize:10.5,color:C.faint}}, sdef.sub)
      );
    });
    var countText = sorted.active.length+" open · "+minToLabel(totalForeground)+" of focus";
    if (schedule.unfittedCount>0){ countText += " · "+schedule.unfittedCount+" past horizon"; }
    sortBtns.push(h("div",{key:"count",style:{marginLeft:"auto",alignSelf:"center",fontSize:11.5,color:C.faint}}, countText));
    children.push(h("div",{key:"sorts",style:{display:"flex",flexWrap:"wrap",gap:6,margin:"16px 0 0"}}, sortBtns));

    var effDots=[]; for(var n=1;n<=MAX_SPOON;n++){ (function(n){ effDots.push(h("button",{key:n,onClick:function(){setNewEffort(n);},"aria-label":"effort "+n,style:{width:16,height:16,borderRadius:8,cursor:"pointer",border:"none",background:n<=newEffort?C.amber:C.line}})); })(n); }
    var effHint = newEffort>=MAX_SPOON ? "≈60+ · decompose?" : "≈"+minToLabel(SPOON_MIN[newEffort]);
    children.push(
      h("div",{key:"capture",style:{marginTop:18,paddingTop:16,borderTop:"1px solid "+C.line}},
        h("input",{value:newTitle,onChange:function(e){setNewTitle(e.target.value);},onKeyDown:function(e){ if(e.key==="Enter") addTask(); },placeholder:"Capture a task — just the title is enough",style:{width:"100%",boxSizing:"border-box",border:"1px solid "+C.panelEdge,borderRadius:3,padding:"10px 12px",fontSize:14,color:C.ink,background:C.panel,fontFamily:"inherit"}}),
        h("div",{style:{display:"flex",gap:16,marginTop:10,alignItems:"center",flexWrap:"wrap"}},
          h("label",{style:{fontSize:12,color:C.sub,display:"inline-flex",alignItems:"center"}}, "effort",
            h("span",{style:{display:"inline-flex",gap:3,marginLeft:8}}, effDots),
            h("span",{style:{marginLeft:8,fontSize:11,color:newEffort>=MAX_SPOON?C.amber:C.faint}}, effHint)
          ),
          h("span",{style:{fontSize:12,color:C.sub,display:"inline-flex",alignItems:"center",gap:8}}, "priority",
            swatchRow(newPriority, function(v){ setNewPriority(v); }, 20)
          ),
          h("button",{onClick:addTask,style:{marginLeft:"auto",background:C.ink,color:C.paper,border:"none",borderRadius:3,padding:"9px 16px",fontSize:13,cursor:"pointer",fontWeight:600}}, "Capture")
        )
      )
    );

    if (dayHistory.combined.length>0){
      var histRows = dayHistory.combined.map(function(hh){
        return h("div",{key:hh.key,style:{display:"flex",gap:10,alignItems:"center",marginBottom:6}},
          hh.kind==="task"
            ? h("span",{style:{width:16,height:16,borderRadius:3,background:C.good,color:"#fff",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:11,flexShrink:0}}, "✓")
            : h("span",{style:{width:16,height:16,borderRadius:3,background:C.fixed,color:"#fff",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:9,flexShrink:0}}, "▦"),
          h("span",{style:{fontSize:13,color:C.faint,textDecoration:hh.kind==="task"?"line-through":"none"}}, hh.title),
          hh.kind==="appt" ? h("span",{style:{fontSize:10.5,color:C.faint}}, "· "+hh.start+"–"+hh.end) : null,
          hh.kind==="task" ? h("button",{onClick:function(){toggleDone(hh.id);},style:{marginLeft:"auto",fontSize:11,color:C.faint,background:"none",border:"none",cursor:"pointer"}}, "undo") : null
        );
      });
      var headChildren = [
        h("span",{key:"tri",style:{fontSize:9,color:C.good,transform:historyOpen?"rotate(90deg)":"none",display:"inline-block"}}, "▶"),
        h("span",{key:"lbl",style:{fontSize:11,letterSpacing:1,textTransform:"uppercase",color:C.good}}, "Today, so far"),
        h("span",{key:"cnt",style:{fontSize:11,color:"#fff",background:C.good,borderRadius:9,padding:"1px 7px",fontWeight:600}}, dayHistory.combined.length)
      ];
      if (!historyOpen && dayHistory.combined[0]){
        headChildren.push(h("span",{key:"peek",style:{fontSize:12,color:C.faint,marginLeft:4,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}, "· "+dayHistory.combined[0].title));
      }
      children.push(
        h("div",{key:"hist",style:{marginTop:22,paddingTop:14,borderTop:"1px dashed "+C.panelEdge}},
          h("button",{onClick:function(){setHistoryOpen(!historyOpen);},style:{display:"flex",alignItems:"center",gap:8,width:"100%",background:"none",border:"none",cursor:"pointer",padding:0,textAlign:"left"}}, headChildren),
          historyOpen ? h("div",{style:{marginTop:10}}, histRows) : null
        )
      );
    }

    return h("section",null, children);
  }

  function background(){
    var kids = [ eyebrow("II","Background"),
      h("p",{key:"lead",style:leadStyle}, "What the scout is ranging on. Set, not nagged — and the same thing as interstitial work.") ];
    if (sorted.background.length===0){
      kids.push(h("div",{key:"empty",style:{fontSize:12.5,color:C.faint,fontStyle:"italic"}}, "No background work set. (Capture a task and mark it background.)"));
    }
    sorted.background.forEach(function(b){
      kids.push(h("div",{key:b.id,style:{border:"1px solid "+C.panelEdge,borderRadius:3,padding:"12px 14px",marginBottom:10,background:C.panel}},
        h("div",{style:{fontSize:14,fontWeight:500,color:C.ink,lineHeight:1.35}}, b.title),
        b.note ? h("div",{style:{fontSize:12,color:C.faint,marginTop:6,lineHeight:1.45}}, b.note) : null
      ));
    });
    return h("section",null,kids);
  }

  function relaxation(){
    return h("section",null,
      eyebrow("III","Relaxation"),
      h("p",{style:leadStyle}, "Restoration, curated to mode and guarded against the pull-you-deeper default."),
      h("div",{style:{fontSize:12.5,color:C.faint,fontStyle:"italic"}}, "The curation surface lands here. (Stocking the gap-restoration set is its own task.)")
    );
  }

  function popupNode(){
    if(!popup) return null;
    var task = tasks.filter(function(x){return x.id===popup.id;})[0];
    if(!task) return null;
    // clamp so the menu stays on-screen. width ~ edit btn + 5 swatches; height one row (or two if editing).
    var vw = (typeof window!=="undefined") ? window.innerWidth : 380;
    var vh = (typeof window!=="undefined") ? window.innerHeight : 700;
    var W = 250, Hpop = 60;
    var x = Math.min(popup.x, vw - W - 10); if(x<10) x=10;
    var y = Math.min(popup.y, vh - Hpop - 10); if(y<10) y=10;
    // Edit launches the inline card field and closes the popup.
    var actionBtn = h("button",{key:"edit",onClick:function(e){ e.stopPropagation(); openEdit(task.id); },
          style:{border:"1px solid "+C.panelEdge,background:C.paper,borderRadius:4,padding:"7px 12px",fontSize:13,fontWeight:600,color:C.ink,cursor:"pointer",whiteSpace:"nowrap"}}, "Edit");
    var menuChildren = [
      h("div",{key:"row",style:{display:"flex",alignItems:"center",gap:12}},
        actionBtn,
        // a swatch press sets priority, persists, and closes the popup — one gesture.
        swatchRow(task.priority, function(v){ setPriorityFor(task.id, v); closePopup(); }, 24)
      )
    ];
    function backdropClose(e){
      if(Date.now() < openGuardUntil.current) return; // ignore the opening gesture's own tail
      closePopup();
    }
    return h("div",{key:"backdrop",onPointerDown:backdropClose,onContextMenu:function(e){e.preventDefault();backdropClose(e);},
        style:{position:"fixed",inset:0,zIndex:50,background:"rgba(28,31,38,0.04)"}},
      h("div",{onPointerDown:function(e){e.stopPropagation();},
        style:{position:"fixed",left:x,top:y,zIndex:51,background:C.panel,border:"1px solid "+C.panelEdge,
          borderRadius:8,padding:"10px 12px",boxShadow:"0 8px 28px rgba(28,31,38,0.18)"}},
        menuChildren)
    );
  }

  var tabBtns = [["foreground","Foreground"],["background","Background"],["relaxation","Relaxation"]].map(function(pair){
    var k=pair[0], label=pair[1], on=tab===k;
    return h("button",{key:k,onClick:function(){setTab(k);},style:{flex:1,border:"1px solid "+(on?C.amber:C.panelEdge),background:on?C.amberSoft:"transparent",color:on?C.ink:C.sub,borderRadius:2,padding:"9px 6px",fontSize:13,fontWeight:600,cursor:"pointer"}}, label);
  });

  return h("div",{style:{minHeight:"100vh"}},
    popupNode(),
    h("header",{style:{maxWidth:1180,margin:"0 auto",padding:"max(28px, env(safe-area-inset-top)) 24px 10px"}},
      h("div",{style:{display:"flex",alignItems:"baseline",justifyContent:"space-between",flexWrap:"wrap",gap:8}},
        h("h1",{style:{margin:0,fontFamily:"Georgia, serif",fontSize:26,fontWeight:600,letterSpacing:-0.2}}, "My Intentional Life v0.2.4"),
        h("div",{style:{fontSize:12.5,color:C.sub,fontStyle:"italic"}}, "the urgent that is always done, and the important that is finally heard")
      ),
      h("div",{id:"status-bar",style:{color:(status.indexOf("Could not")===0||status.indexOf("failed")>-1)?"#a23":C.faint}}, status),
      h("div",{style:{height:1,background:C.panelEdge}})
    ),
    h("div",{className:"il-tabs",style:{maxWidth:1180,margin:"0 auto",padding:"10px 24px 0",gap:6}}, tabBtns),
    h("main",{style:{maxWidth:1180,margin:"0 auto",padding:"18px 24px calc(60px + env(safe-area-inset-bottom))"}},
      h("div",{className:"il-cols"},
        h("section",{className:tab==="foreground"?"il-active":""}, foreground()),
        h("section",{className:tab==="background"?"il-active":""}, background()),
        h("section",{className:tab==="relaxation"?"il-active":""}, relaxation())
      )
    )
  );
}

var leadStyle = { margin:"0 0 16px", fontSize:12.5, color:C.sub, lineHeight:1.5, maxWidth:"42ch" };

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>

</body>
</html>
